<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAPI TEAM — Panel Kendali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root{
    --bg:#0F1B22; --surface:#16272F; --surface2:#1D323B; --line:#2A3E46;
    --amber:#E8A33D; --teal:#4FB0A5; --text:#EDE7DA; --muted:#8FA3AB; --danger:#D9705C;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); min-height:100vh;}
  .display{font-family:'Space Grotesk',sans-serif;}
  .px{padding-left:20px; padding-right:20px;}
  @media(min-width:640px){ .px{padding-left:32px; padding-right:32px;} }
  .flex{display:flex;} .items-center{align-items:center;} .justify-between{justify-content:space-between;}
  .gap-1{gap:4px;} .gap-2{gap:8px;} .gap-3{gap:12px;} .flex-wrap{flex-wrap:wrap;}
  .rounded-md{border-radius:8px;} .rounded-lg{border-radius:12px;} .rounded-xl{border-radius:16px;} .rounded-full{border-radius:999px;}
  .hidden{display:none !important;}
  button{cursor:pointer; font-family:inherit; border:none;}
  input, select{font-family:inherit;}
  input:focus, select:focus, button:focus-visible{ outline:2px solid var(--amber); outline-offset:1px; }
  button:disabled{cursor:not-allowed; opacity:0.7;}

  /* Header */
  .header{padding:32px 20px 20px; border-bottom:1px solid var(--line);}
  @media(min-width:640px){.header{padding:32px 32px 20px;}}
  .logo-box{width:32px;height:32px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center;}
  .brand-title{font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:0;}
  .brand-sub{color:var(--muted); font-size:13px; margin:2px 0 0 40px;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid;}
  .chip-muted{background:rgba(143,163,171,0.12); color:var(--muted); border-color:var(--line);}
  .chip-amber{background:rgba(232,163,61,0.14); color:var(--amber); border-color:rgba(232,163,61,0.35);}
  .chip-teal{background:rgba(79,176,165,0.14); color:var(--teal); border-color:rgba(79,176,165,0.35);}
  .chip-danger{background:rgba(217,112,92,0.14); color:var(--danger); border-color:rgba(217,112,92,0.35);}
  .btn-ghost-danger{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;color:var(--danger);border:1px solid var(--line);background:transparent;}
  .mode-toggle{display:flex;gap:4px;padding:4px;border-radius:12px;background:var(--surface);}
  .mode-toggle button{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;background:transparent;color:var(--muted);}
  .mode-toggle button.active{background:var(--amber); color:var(--bg);}

  /* Card / inputs */
  .card{border-radius:16px; padding:20px; background:var(--surface); border:1px solid var(--line);}
  .card-dashed{border-radius:16px; padding:24px; text-align:center; background:var(--surface); border:1px dashed var(--line);}
  .field-label{color:var(--muted); font-size:12px; display:block; margin-bottom:4px;}
  .input{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:8px 12px; border-radius:8px; font-size:14px; outline:none;}
  .btn-amber{display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; background:var(--amber); color:var(--bg); font-family:'Space Grotesk',sans-serif;}
  .btn-teal{display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; background:var(--teal); color:var(--bg); font-family:'Space Grotesk',sans-serif;}
  .btn-outline-danger{display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:500; color:var(--danger); border:1px solid var(--line); background:transparent;}
  .btn-outline{display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:500; color:var(--text); border:1px solid var(--line); background:var(--surface2); font-family:'Space Grotesk',sans-serif;}

  /* Login */
  .login-shell{padding:40px 20px; display:flex; justify-content:center;}
  .login-card{width:100%; max-width:380px; border-radius:16px; padding:24px; background:var(--surface); border:1px solid var(--line);}
  .pw-wrap{position:relative;}
  .pw-toggle{position:absolute; right:8px; top:50%; transform:translateY(-50%); background:transparent; color:var(--muted); padding:2px;}

  /* Tabs */
  .tabs{display:flex; gap:4px; padding:4px; border-radius:12px; background:var(--surface); width:fit-content;}
  .tabs button{display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; background:transparent; color:var(--muted); font-family:'Space Grotesk',sans-serif;}
  .tabs button.active{background:var(--amber); color:var(--bg);}

  /* Event list */
  .event-card{border-radius:16px; overflow:hidden; background:var(--surface); border:1px solid var(--line);}
  .event-head{width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; text-align:left; background:transparent; color:inherit;}
  .event-body{padding:4px 16px 16px; border-top:1px solid var(--line);}
  .part-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:8px 12px; border-radius:8px; background:var(--surface2); margin-bottom:8px;}
  .part-input{width:96px; padding:4px 8px; border-radius:6px; font-size:12px;}

  .progress-track{width:100%; height:8px; border-radius:999px; overflow:hidden; background:var(--surface2); margin-bottom:12px;}
  .progress-fill{height:100%; border-radius:999px; transition:width .3s;}

  .acc-row{display:flex; align-items:center; justify-content:space-between; border-radius:12px; padding:12px 16px; background:var(--surface2); border:1px solid var(--line); margin-bottom:8px;}
  .acc-avatar{width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;}

  .footer-note{padding:16px 20px; text-align:center; color:var(--muted); font-size:11px;}
  @media(min-width:640px){.footer-note{padding:16px 32px;}}

  .grid2{display:grid; grid-template-columns:1fr; gap:12px;}
  @media(min-width:640px){.grid2{grid-template-columns:1fr 1fr;}}

  .conn-banner{padding:8px 20px; text-align:center; font-size:12px; background:rgba(232,163,61,0.14); color:var(--amber); border-bottom:1px solid rgba(232,163,61,0.35);}
</style>
</head>
<body>

<div id="app">
  <div class="conn-banner">Menyambungkan ke server…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot,
  collection, addDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

/* ---------- Firebase init ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyB674t6fiJ8HT9ENfeS3Vzv-BSGQTQ-3BI",
  authDomain: "rapi-dev-43ddf.firebaseapp.com",
  projectId: "rapi-dev-43ddf",
  storageBucket: "rapi-dev-43ddf.firebasestorage.app",
  messagingSenderId: "392684134756",
  appId: "1:392684134756:web:6ef9ed85f4fb29db29da71"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const accountsRef = doc(db, "rapiTeam", "accounts");
const statusRef = doc(db, "rapiTeam", "status");
const eventsRef = collection(db, "rapiTeamEvents");

/* ---------- Data & palette ---------- */
const palette = {
  bg:"#0F1B22", surface:"#16272F", surface2:"#1D323B", line:"#2A3E46",
  amber:"#E8A33D", teal:"#4FB0A5", text:"#EDE7DA", muted:"#8FA3AB", danger:"#D9705C",
};
const rupiah = (n) => "Rp" + (Number(n) || 0).toLocaleString("id-ID");

const DEFAULT_ACCOUNTS = [
  { name: "Rapi", role: "Owner", password: "rapi2026" },
  { name: "Nizam", role: "Admin", password: "nizam123" },
  { name: "Vivi", role: "Admin", password: "vivi123" },
  { name: "Nanau", role: "Admin", password: "nanau123" },
  { name: "Michelle", role: "Admin", password: "michelle123" },
];

/* ---------- App state ---------- */
let state = {
  ready: false, // becomes true once first data arrives from Firestore
  now: new Date(),
  tab: "acara",
  mode: "admin",
  accounts: [],
  session: null,
  loginName: "",
  loginPassword: "",
  loginError: "",
  showPw: false,
  pwCurrent: "",
  pwNew: "",
  pwMsg: "",
  queueCount: 0,
  pushMode: false,
  groupOpen: true,
  events: [],
  expanded: null,
  copiedId: null,
  partInputs: {},
  form: { judul:"", tanggal:"", waktu:"", lokasi:"", biayaText:"Gratis", biayaNominal:"", kuota:"", batas:"" },
};

function setState(patch) { Object.assign(state, patch); render(); }

/* ---------- Firestore live sync ---------- */
onSnapshot(accountsRef, async (snap) => {
  if (snap.exists() && snap.data().list) {
    state.accounts = snap.data().list;
  } else {
    await setDoc(accountsRef, { list: DEFAULT_ACCOUNTS });
    state.accounts = DEFAULT_ACCOUNTS;
  }
  if (!state.loginName && state.accounts[0]) state.loginName = state.accounts[0].name;
  state.ready = true;
  render();
}, (err) => {
  document.getElementById("app").innerHTML = `<div class="conn-banner" style="background:rgba(217,112,92,0.14); color:${palette.danger};">Gagal konek ke server: ${err.message}</div>`;
});

onSnapshot(statusRef, async (snap) => {
  if (snap.exists()) {
    const d = snap.data();
    state.queueCount = d.queueCount ?? 0;
    state.pushMode = d.pushMode ?? false;
    state.groupOpen = d.groupOpen ?? true;
  } else {
    await setDoc(statusRef, { queueCount: 0, pushMode: false, groupOpen: true });
  }
  render();
});

onSnapshot(eventsRef, (snap) => {
  const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  // newest first (by createdAt if present, fallback keep order)
  list.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
  state.events = list;
  render();
});

/* ---------- Actions ---------- */
async function saveAccounts(list) {
  state.accounts = list;
  await setDoc(accountsRef, { list });
}
async function saveStatus(patch) {
  Object.assign(state, patch);
  render();
  await setDoc(statusRef, { queueCount: state.queueCount, pushMode: state.pushMode, groupOpen: state.groupOpen });
}

function doLogin() {
  const acc = state.accounts.find(a => a.name === state.loginName);
  if (acc && acc.password === state.loginPassword) {
    setState({ session: { name: acc.name, role: acc.role }, loginError: "", loginPassword: "" });
  } else {
    setState({ loginError: "Nama atau password salah." });
  }
}
function doLogout() { setState({ session: null, tab: "acara" }); }

async function changePassword() {
  const acc = state.accounts.find(a => a.name === state.session?.name);
  if (!acc || acc.password !== state.pwCurrent) { setState({ pwMsg: "Password lama salah." }); return; }
  if (!state.pwNew.trim()) { setState({ pwMsg: "Password baru tidak boleh kosong." }); return; }
  const list = state.accounts.map(a => a.name === state.session.name ? { ...a, password: state.pwNew.trim() } : a);
  await saveAccounts(list);
  setState({ pwCurrent: "", pwNew: "", pwMsg: "Password berhasil diganti." });
}

function buildEventText(e) {
  return `╔══════════════════════════╗
   🎉 EVENT RAPI TEAM 🎉
╚══════════════════════════╝

📢 Halo semua member Rapi Team!

Owner mengadakan ${e.judul || "acara bareng"} nih! 🚶‍♂️🚶‍♀️
Yuk yang mau ikut, merapat! 🔥

╭──────────────
📅 Tanggal   : ${e.tanggal || "[isi tanggal]"}
⏰ Waktu     : ${e.waktu || "[isi jam]"}
📍 Lokasi    : ${e.lokasi || "[isi lokasi]"}
💰 Biaya     : ${e.biayaText || "[isi biaya]"}
👥 Kuota     : ${e.kuota || "[tanpa batas]"}
⏳ Batas Konfirmasi : ${e.batas || "[isi tanggal]"}
╰──────────────

📝 FORMAT KONFIRMASI (isi & kirim ke Admin):

Nama :
Kesiapan Hadir : Ikut / Tidak
Catatan (opsional) :

📌 KETENTUAN:
• Wajib konfirmasi sebelum batas waktu di atas
• Diharapkan on time
• Jaga sikap & nama baik Rapi Team selama acara
• Dilarang bawa drama 😄

Ditunggu partisipasinya ya, biar makin seru dan kompak! 💪

— Admin Rapi Team (atas arahan Owner)`;
}

async function createEvent() {
  if (!state.form.judul.trim()) return;
  const payload = { ...state.form, participants: [], createdAt: Date.now() };
  setState({ form: { judul:"", tanggal:"", waktu:"", lokasi:"", biayaText:"Gratis", biayaNominal:"", kuota:"", batas:"" } });
  const docRef = await addDoc(eventsRef, payload);
  setState({ expanded: docRef.id });
}
async function removeEvent(id) {
  setState({ expanded: state.expanded === id ? null : state.expanded });
  await deleteDoc(doc(db, "rapiTeamEvents", id));
}
async function copyEventText(e) {
  try {
    await navigator.clipboard.writeText(buildEventText(e));
    setState({ copiedId: e.id });
    setTimeout(() => setState({ copiedId: null }), 1800);
  } catch {}
}
function getPartInput(eid) {
  return state.partInputs[eid] || { name:"", due: (state.events.find(e => e.id===eid)?.biayaNominal) || "" };
}
function setPartInput(eid, patch) {
  state.partInputs[eid] = { ...getPartInput(eid), ...patch };
}
async function addParticipant(eid) {
  const input = getPartInput(eid);
  if (!input.name.trim()) return;
  const e = state.events.find(x => x.id === eid);
  const participant = { id: Date.now().toString(), name: input.name.trim(), due: Number(input.due)||0, paid: 0 };
  const newParticipants = [...e.participants, participant];
  setPartInput(eid, { name:"", due: input.due });
  await updateDoc(doc(db, "rapiTeamEvents", eid), { participants: newParticipants });
}
async function updateParticipant(eid, pid, patch) {
  const e = state.events.find(x => x.id === eid);
  const newParticipants = e.participants.map(p => p.id === pid ? { ...p, ...patch } : p);
  await updateDoc(doc(db, "rapiTeamEvents", eid), { participants: newParticipants });
}
async function removeParticipant(eid, pid) {
  const e = state.events.find(x => x.id === eid);
  const newParticipants = e.participants.filter(p => p.id !== pid);
  await updateDoc(doc(db, "rapiTeamEvents", eid), { participants: newParticipants });
}

/* ---------- Small render helpers ---------- */
function chip(text, tone, extraStyle) {
  const tones = {
    muted: `background:rgba(143,163,171,0.12); color:${palette.muted}; border-color:${palette.line};`,
    amber: `background:rgba(232,163,61,0.14); color:${palette.amber}; border-color:rgba(232,163,61,0.35);`,
    teal: `background:rgba(79,176,165,0.14); color:${palette.teal}; border-color:rgba(79,176,165,0.35);`,
    danger: `background:rgba(217,112,92,0.14); color:${palette.danger}; border-color:rgba(217,112,92,0.35);`,
  };
  return `<span class="chip" style="${tones[tone]}${extraStyle||""}">${text}</span>`;
}
function esc(str) {
  return String(str ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
}

/* ---------- Render ---------- */
function render() {
  const s = state;

  if (!s.ready) {
    document.getElementById("app").innerHTML = `<div class="conn-banner">Menyambungkan ke server…</div>`;
    return;
  }

  const isActive = s.now.getHours() >= 7;
  const readyToAccept = s.queueCount >= 10 && !s.pushMode;

  let html = "";

  html += `
  <div class="header">
    <div class="flex items-center justify-between flex-wrap gap-3">
      <div>
        <div class="flex items-center gap-2">
          <div class="logo-box"><i data-lucide="shield-check" size="18" color="${palette.bg}"></i></div>
          <h1 class="display brand-title">RAPI TEAM</h1>
        </div>
        <p class="brand-sub">${s.mode === "admin" ? (s.session ? `Masuk sebagai ${esc(s.session.name)} (${esc(s.session.role)})` : "Panel kendali Admin & Owner") : "Konfirmasi kehadiran member"}</p>
      </div>
      <div class="flex items-center gap-2 flex-wrap">
        ${s.mode === "admin" && s.session ? `
          ${chip(`<i data-lucide="clock" size="13"></i> ${isActive ? "Aktif · 07.00–24.00" : "Istirahat · 00.00–07.00"}`, isActive ? "teal" : "muted")}
          ${chip(`<i data-lucide="${s.groupOpen ? "door-open" : "door-closed"}" size="13"></i> ${s.groupOpen ? "Grup Terbuka" : "Grup Tertutup"}`, s.groupOpen ? "teal" : "danger")}
          <button class="btn-ghost-danger" onclick="doLogout()"><i data-lucide="log-out" size="13"></i> Keluar</button>
        ` : ""}
        <div class="mode-toggle">
          <button class="${s.mode==="admin"?"active":""}" onclick="setState({mode:'admin'})">Saya Admin</button>
          <button class="${s.mode==="member"?"active":""}" onclick="setState({mode:'member'})">Saya Member</button>
        </div>
      </div>
    </div>
  </div>`;

  if (s.mode === "admin" && !s.session) {
    html += `
    <div class="login-shell">
      <div class="login-card">
        <div class="flex items-center gap-2" style="margin-bottom:16px;">
          <i data-lucide="lock" size="16" color="${palette.amber}"></i>
          <h2 class="display" style="font-size:15px; font-weight:600; margin:0;">Masuk sebagai Admin/Owner</h2>
        </div>
        <label class="field-label">Nama</label>
        <select class="input" style="margin-bottom:12px;" onchange="setState({loginName:this.value})">
          ${s.accounts.map(a => `<option value="${esc(a.name)}" ${a.name===s.loginName?"selected":""}>${esc(a.name)} — ${esc(a.role)}</option>`).join("")}
        </select>
        <label class="field-label">Password</label>
        <div class="pw-wrap" style="margin-bottom:12px;">
          <input class="input" style="padding-right:36px;" type="${s.showPw?"text":"password"}" value="${esc(s.loginPassword)}"
            oninput="state.loginPassword=this.value" onkeydown="if(event.key==='Enter'){doLogin();}" />
          <button class="pw-toggle" onclick="setState({showPw:!state.showPw})"><i data-lucide="${s.showPw?"eye-off":"eye"}" size="15"></i></button>
        </div>
        ${s.loginError ? `<p style="color:${palette.danger}; font-size:12px; margin-bottom:8px;">${esc(s.loginError)}</p>` : ""}
        <button class="btn-amber" style="width:100%; justify-content:center;" onclick="doLogin()"><i data-lucide="lock" size="14"></i> Masuk</button>
        <p style="color:${palette.muted}; font-size:11px; margin-top:12px; line-height:1.5;">
          Hanya 5 akun (1 Owner + 4 Admin) yang bisa masuk ke panel ini. Member biasa tetap bisa konfirmasi kehadiran lewat tombol "Saya Member" tanpa perlu login.
        </p>
      </div>
    </div>`;
  }

  if (s.mode === "admin" && s.session) {
    html += `
    <div class="px" style="padding-top:20px; padding-bottom:20px; border-bottom:1px solid ${palette.line};">
      <div class="card">
        <div class="flex items-center justify-between flex-wrap gap-2" style="margin-bottom:12px;">
          <div class="flex items-center gap-2">
            <i data-lucide="trending-up" size="16" color="${palette.amber}"></i>
            <span class="display" style="font-weight:600; font-size:14px;">Antrian Permintaan Masuk</span>
          </div>
          <label class="flex items-center gap-2" style="font-size:12px; color:${palette.muted}; cursor:pointer;">
            <input type="checkbox" ${s.pushMode?"checked":""} onchange="saveStatus({pushMode:this.checked})" style="accent-color:${palette.amber};" />
            Owner sedang push member
          </label>
        </div>
        <div class="flex items-center gap-3" style="margin-bottom:8px;">
          <button class="btn-outline" style="width:28px;height:28px;justify-content:center;padding:0;" onclick="saveStatus({queueCount:Math.max(0, state.queueCount-1)})">−</button>
          <span class="display" style="font-size:20px; font-weight:700; min-width:24px; text-align:center;">${s.queueCount}</span>
          <button class="btn-outline" style="width:28px;height:28px;justify-content:center;padding:0;" onclick="saveStatus({queueCount:state.queueCount+1})">+</button>
          <span style="color:${palette.muted}; font-size:12px;">permintaan menunggu / target 10</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill" style="width:${Math.min(100,(s.queueCount/10)*100)}%; background:${readyToAccept?palette.teal:palette.amber};"></div>
        </div>
        <p style="color:${readyToAccept?palette.teal:palette.muted}; font-size:13px; font-weight:500;">
          ${s.pushMode ? "⏸ Ditahan — Owner sedang push member. Jangan terima request dulu." : readyToAccept ? "✅ Sudah 10+ request — boleh diterima sekaligus." : `⏳ Belum cukup — tunggu ${10 - s.queueCount} request lagi sebelum diterima.`}
        </p>
      </div>
    </div>`;
  }

  if (s.mode === "admin" && s.session) {
    html += `
    <div class="px" style="padding-top:20px;">
      <div class="tabs">
        <button class="${s.tab==='acara'?'active':''}" onclick="setState({tab:'acara'})"><i data-lucide="calendar-plus" size="15"></i> Buat Acara</button>
        <button class="${s.tab==='admin'?'active':''}" onclick="setState({tab:'admin'})"><i data-lucide="users" size="15"></i> Tim Admin</button>
      </div>
    </div>`;

    html += `<div class="px" style="padding-top:24px; padding-bottom:24px;">`;

    if (s.tab === "acara") {
      html += `<div style="display:flex; flex-direction:column; gap:24px;">`;
      const fields = [
        { key:"judul", label:"Nama kegiatan", placeholder:"Jalan-jalan bareng" },
        { key:"tanggal", label:"Tanggal", placeholder:"Minggu, 12 Juli 2026" },
        { key:"waktu", label:"Waktu", placeholder:"09.00 WIB" },
        { key:"lokasi", label:"Lokasi", placeholder:"Taman Kota" },
        { key:"biayaText", label:"Biaya (teks di pengumuman)", placeholder:"Gratis / patungan" },
        { key:"biayaNominal", label:"Biaya per orang (Rp, angka)", placeholder:"20000" },
        { key:"kuota", label:"Kuota (opsional)", placeholder:"20 orang" },
        { key:"batas", label:"Batas konfirmasi", placeholder:"Jumat, 10 Juli 2026" },
      ];
      html += `
      <div class="card">
        <h2 class="display" style="font-size:15px; font-weight:600; margin:0 0 10px;">Buat acara baru</h2>
        <div class="grid2">
          ${fields.map(f => `
            <div>
              <label class="field-label">${f.label}</label>
              <input class="input" style="margin-top:4px;" value="${esc(s.form[f.key])}" placeholder="${esc(f.placeholder)}"
                oninput="state.form['${f.key}']=this.value" />
            </div>
          `).join("")}
        </div>
        <button class="btn-amber" style="margin-top:16px;" onclick="createEvent()"><i data-lucide="plus" size="15"></i> Simpan acara</button>
      </div>`;

      html += `<div><h2 class="display" style="font-size:15px; font-weight:600; margin:0 0 10px;">Acara tersimpan</h2>`;
      if (s.events.length === 0) {
        html += `<div class="card-dashed"><p style="color:${palette.muted}; font-size:13px; margin:0;">Belum ada acara. Buat dulu di atas.</p></div>`;
      } else {
        html += `<div style="display:flex; flex-direction:column; gap:12px;">`;
        s.events.forEach(e => {
          const totalDue = e.participants.reduce((sum,p)=>sum+(Number(p.due)||0),0);
          const totalPaid = e.participants.reduce((sum,p)=>sum+(Number(p.paid)||0),0);
          const lunasCount = e.participants.filter(p=>Number(p.paid)>=Number(p.due) && Number(p.due)>0).length;
          const isOpen = s.expanded === e.id;
          const pInput = getPartInput(e.id);

          html += `<div class="event-card">
            <button type="button" class="event-head" onclick="setState({expanded: state.expanded==='${e.id}'?null:'${e.id}'})">
              <div style="min-width:0;">
                <p class="display" style="font-size:14px; font-weight:600; margin:0;">${esc(e.judul || "(tanpa nama)")}</p>
                <p style="color:${palette.muted}; font-size:12px; margin:2px 0 0;">${esc(e.tanggal || "Tanggal belum diisi")} · ${e.participants.length} peserta</p>
              </div>
              <div class="flex items-center gap-2">
                ${totalDue>0 ? chip(`<i data-lucide="wallet" size="12"></i> ${rupiah(totalPaid)}/${rupiah(totalDue)}`, (lunasCount===e.participants.length && e.participants.length>0) ? "teal" : "amber") : ""}
                <span class="flex items-center gap-1" style="color:${palette.amber}; font-size:12px; font-weight:500;">
                  ${isOpen ? "Tutup" : "Lihat detail"} <i data-lucide="${isOpen?"chevron-up":"chevron-down"}" size="16"></i>
                </span>
              </div>
            </button>
            ${isOpen ? `
            <div class="event-body">
              <div class="flex items-center gap-2 flex-wrap" style="margin:12px 0 16px;">
                <button class="btn-outline" style="${s.copiedId===e.id?`background:${palette.teal}; color:${palette.bg};`:""}" onclick="copyEventText(state.events.find(x=>x.id==='${e.id}'))">
                  <i data-lucide="${s.copiedId===e.id?"check":"copy"}" size="13"></i> ${s.copiedId===e.id?"Tersalin":"Salin teks pengumuman"}
                </button>
                <button class="btn-outline-danger" onclick="removeEvent('${e.id}')"><i data-lucide="trash-2" size="13"></i> Hapus acara</button>
              </div>
              <p class="display" style="font-size:13px; font-weight:600; margin:0 0 8px;">Peserta & pembayaran</p>
              <div class="flex gap-2 flex-wrap" style="margin-bottom:12px;">
                <input class="input" style="flex:1; min-width:130px;" placeholder="Nama peserta" value="${esc(pInput.name)}"
                  oninput="setPartInput('${e.id}',{name:this.value})" />
                <input class="input" type="number" style="width:144px;" placeholder="Wajib bayar (Rp)" value="${esc(pInput.due)}"
                  oninput="setPartInput('${e.id}',{due:this.value})" />
                <button class="btn-amber" onclick="addParticipant('${e.id}')"><i data-lucide="plus" size="14"></i> Tambah</button>
              </div>
              ${e.participants.length===0 ? `<p style="color:${palette.muted}; font-size:12px;">Belum ada peserta yang daftar.</p>` : `
                <div>
                ${e.participants.map(p => {
                  const lunas = Number(p.paid) >= Number(p.due) && Number(p.due) > 0;
                  const sisa = Math.max(0, Number(p.due) - Number(p.paid));
                  return `<div class="part-row">
                    <span style="font-size:13px; font-weight:500; min-width:100px;">${esc(p.name)}</span>
                    <span style="color:${palette.muted}; font-size:11px;">Wajib</span>
                    <input type="number" class="input part-input" value="${esc(p.due)}" onchange="updateParticipant('${e.id}','${p.id}',{due:this.value})" />
                    <span style="color:${palette.muted}; font-size:11px;">Sudah bayar</span>
                    <input type="number" class="input part-input" value="${esc(p.paid)}" onchange="updateParticipant('${e.id}','${p.id}',{paid:this.value})" />
                    ${p.due>0 ? chip(lunas?"Lunas":`Sisa ${rupiah(sisa)}`, lunas?"teal":"danger") : chip("Gratis","muted")}
                    <button style="margin-left:auto; background:transparent; color:${palette.danger};" onclick="removeParticipant('${e.id}','${p.id}')"><i data-lucide="trash-2" size="14"></i></button>
                  </div>`;
                }).join("")}
                </div>
              `}
            </div>` : ""}
          </div>`;
        });
        html += `</div>`;
      }
      html += `</div></div>`;
    }

    if (s.tab === "admin") {
      html += `<div style="max-width:640px; display:flex; flex-direction:column; gap:16px;">
        <div class="card">
          <h2 class="display" style="font-size:15px; font-weight:600; margin:0 0 10px;">Akun Admin & Owner</h2>
          <p style="color:${palette.muted}; font-size:12px; margin:0 0 12px;">Hanya 5 akun ini yang bisa login ke panel — nggak bisa ditambah member sembarangan.</p>
          <div>
            ${s.accounts.map(a => `
              <div class="acc-row">
                <div class="flex items-center gap-3">
                  <div class="acc-avatar" style="background:${a.role==='Owner'?'rgba(232,163,61,0.16)':'rgba(79,176,165,0.16)'};">
                    <i data-lucide="${a.role==='Owner'?'crown':'shield-check'}" size="14" color="${a.role==='Owner'?palette.amber:palette.teal}"></i>
                  </div>
                  <div>
                    <p style="font-size:14px; font-weight:500; margin:0;">${esc(a.name)}${a.name===s.session.name?" (kamu)":""}</p>
                    ${chip(esc(a.role), a.role==='Owner'?'amber':'teal', 'margin-top:4px;')}
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
        <div class="card">
          <h2 class="display" style="font-size:15px; font-weight:600; margin:0 0 10px;">Ganti password kamu (${esc(s.session.name)})</h2>
          <div class="grid2" style="margin-bottom:12px;">
            <input class="input" type="password" placeholder="Password lama" value="${esc(s.pwCurrent)}" oninput="state.pwCurrent=this.value" />
            <input class="input" type="password" placeholder="Password baru" value="${esc(s.pwNew)}" oninput="state.pwNew=this.value" />
          </div>
          ${s.pwMsg ? `<p style="color:${s.pwMsg.includes('berhasil')?palette.teal:palette.danger}; font-size:12px; margin-bottom:8px;">${esc(s.pwMsg)}</p>` : ""}
          <button class="btn-amber" onclick="changePassword()"><i data-lucide="lock" size="14"></i> Simpan password baru</button>
        </div>
      </div>`;
    }

    html += `</div>`;
  }

  if (s.mode === "member") {
    html += `<div class="px" style="padding-top:24px; padding-bottom:24px; max-width:600px;">
      <h2 class="display" style="font-size:15px; font-weight:600; margin:0 0 4px;">Acara yang bisa diikuti</h2>
      <p style="color:${palette.muted}; font-size:13px; margin:0 0 16px;">Pilih acara, isi nama, lalu konfirmasi ikut.</p>
      ${s.events.length===0 ? `
        <div class="card-dashed"><p style="color:${palette.muted}; font-size:13px; margin:0;">Belum ada acara yang dibuat Admin.</p></div>
      ` : `
      <div style="display:flex; flex-direction:column; gap:12px;">
        ${s.events.map(e => {
          const pInput = getPartInput(e.id);
          const nameTrim = pInput.name.trim();
          const alreadyJoined = nameTrim !== "" && e.participants.some(p => p.name.toLowerCase() === nameTrim.toLowerCase());
          return `<div class="card">
            <p class="display" style="font-size:15px; font-weight:600; margin:0;">${esc(e.judul || "(tanpa nama)")}</p>
            <div class="flex flex-wrap gap-3" style="margin:4px 0 12px; color:${palette.muted}; font-size:12px;">
              ${e.tanggal?`<span>📅 ${esc(e.tanggal)}</span>`:""}
              ${e.waktu?`<span>⏰ ${esc(e.waktu)}</span>`:""}
              ${e.lokasi?`<span>📍 ${esc(e.lokasi)}</span>`:""}
            </div>
            <div class="flex flex-wrap gap-2" style="margin-bottom:12px;">
              ${chip(`💰 ${esc(e.biayaText || "-")}`, "amber")}
              ${e.kuota?chip(`👥 kuota ${esc(e.kuota)}`,"muted"):""}
              ${e.batas?chip(`⏳ batas ${esc(e.batas)}`,"muted"):""}
              ${chip(`${e.participants.length} sudah konfirmasi`,"teal")}
            </div>
            <div class="flex gap-2 flex-wrap">
              <input class="input" style="flex:1; min-width:140px;" placeholder="Nama kamu" value="${esc(pInput.name)}"
                oninput="setPartInput('${e.id}',{name:this.value}); refreshJoinButton('${e.id}')" id="member-input-${e.id}" />
              <button class="${alreadyJoined?'btn-outline':'btn-teal'}" id="member-btn-${e.id}" ${alreadyJoined?'disabled':''} onclick="addParticipant('${e.id}')">
                <i data-lucide="check" size="14"></i> ${alreadyJoined?"Sudah ikut":"Konfirmasi ikut"}
              </button>
            </div>
            ${e.participants.length>0?`<p style="color:${palette.muted}; font-size:11px; margin-top:8px;">Sudah konfirmasi: ${e.participants.map(p=>esc(p.name)).join(", ")}</p>`:""}
          </div>`;
        }).join("")}
      </div>
      `}
    </div>`;
  }

  html += `<div class="footer-note">Semua data (akun, acara, peserta, pembayaran) tersimpan di Firestore dan sinkron otomatis di semua perangkat.</div>`;

  document.getElementById("app").innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

function refreshJoinButton(eid) {
  const input = document.getElementById(`member-input-${eid}`);
  const btn = document.getElementById(`member-btn-${eid}`);
  if (!input || !btn) return;
  const e = state.events.find(x => x.id === eid);
  const nameTrim = input.value.trim();
  const alreadyJoined = nameTrim !== "" && e.participants.some(p => p.name.toLowerCase() === nameTrim.toLowerCase());
  btn.disabled = alreadyJoined;
  btn.className = alreadyJoined ? "btn-outline" : "btn-teal";
  btn.innerHTML = `<i data-lucide="check" size="14"></i> ${alreadyJoined ? "Sudah ikut" : "Konfirmasi ikut"}`;
  if (window.lucide) lucide.createIcons();
}

setInterval(() => { state.now = new Date(); render(); }, 30000);

/* expose functions used by inline onclick/oninput handlers */
window.state = state;
window.setState = setState;
window.saveStatus = saveStatus;
window.doLogin = doLogin;
window.doLogout = doLogout;
window.changePassword = changePassword;
window.createEvent = createEvent;
window.removeEvent = removeEvent;
window.copyEventText = copyEventText;
window.setPartInput = setPartInput;
window.addParticipant = addParticipant;
window.updateParticipant = updateParticipant;
window.removeParticipant = removeParticipant;
window.refreshJoinButton = refreshJoinButton;

render();
</script>
</body>
</html>
