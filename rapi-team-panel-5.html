<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAPI TEAM — Panel Kendali</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root{
    --bg:#0F1B22; --surface:#16272F; --surface2:#1D323B; --line:#2A3E46;
    --amber:#E8A33D; --teal:#4FB0A5; --text:#EDE7DA; --muted:#8FA3AB; --danger:#D9705C;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); min-height:100vh;}
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .px{padding-left:20px; padding-right:20px;}
  @media(min-width:640px){ .px{padding-left:32px; padding-right:32px;} }
  .flex{display:flex;} .items-center{align-items:center;} .justify-between{justify-content:space-between;}
  .gap-1{gap:4px;} .gap-2{gap:8px;} .gap-3{gap:12px;} .flex-wrap{flex-wrap:wrap;}
  .rounded-md{border-radius:8px;} .rounded-lg{border-radius:12px;} .rounded-xl{border-radius:16px;} .rounded-full{border-radius:999px;}
  .hidden{display:none !important;}
  button{cursor:pointer; font-family:inherit; border:none;}
  input, select{font-family:inherit;}
  input:focus, select:focus, button:focus-visible{ outline:2px solid var(--amber); outline-offset:1px; }
  button:disabled{cursor:not-allowed; opacity:0.7;}
  ::selection{background:rgba(232,163,61,0.35);}

  /* Header */
  .header{padding:32px 20px 20px; border-bottom:1px solid var(--line);}
  @media(min-width:640px){.header{padding:32px 32px 20px;}}
  .logo-box{width:32px;height:32px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center;}
  .brand-title{font-size:22px; font-weight:700; letter-spacing:-0.02em; margin:0;}
  .brand-sub{color:var(--muted); font-size:13px; margin:2px 0 0 40px;}
  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:500;border:1px solid;}
  .chip-muted{background:rgba(143,163,171,0.12); color:var(--muted); border-color:var(--line);}
  .chip-amber{background:rgba(232,163,61,0.14); color:var(--amber); border-color:rgba(232,163,61,0.35);}
  .chip-teal{background:rgba(79,176,165,0.14); color:var(--teal); border-color:rgba(79,176,165,0.35);}
  .chip-danger{background:rgba(217,112,92,0.14); color:var(--danger); border-color:rgba(217,112,92,0.35);}
  .btn-ghost-danger{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;color:var(--danger);border:1px solid var(--line);background:transparent;transition:background .15s;}
  .btn-ghost-danger:hover{background:rgba(217,112,92,0.1);}
  .btn-role-switch{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:500;color:var(--muted);border:1px solid var(--line);background:var(--surface);transition:background .15s, color .15s;}
  .btn-role-switch:hover{color:var(--text); background:var(--surface2);}

  /* Card / inputs */
  .card{border-radius:16px; padding:20px; background:var(--surface); border:1px solid var(--line);}
  .card-dashed{border-radius:16px; padding:24px; text-align:center; background:var(--surface); border:1px dashed var(--line);}
  .field-label{color:var(--muted); font-size:12px; display:block; margin-bottom:4px;}
  .input{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:8px 12px; border-radius:8px; font-size:14px; outline:none; transition:border-color .15s;}
  .input:focus{border-color:var(--amber);}
  .btn-amber{display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; background:var(--amber); color:var(--bg); font-family:'Space Grotesk',sans-serif; transition:transform .12s, filter .12s;}
  .btn-amber:hover{filter:brightness(1.08);} .btn-amber:active{transform:scale(0.97);}
  .btn-teal{display:inline-flex; align-items:center; gap:6px; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; background:var(--teal); color:var(--bg); font-family:'Space Grotesk',sans-serif; transition:transform .12s, filter .12s;}
  .btn-teal:hover{filter:brightness(1.08);} .btn-teal:active{transform:scale(0.97);}
  .btn-outline-danger{display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:500; color:var(--danger); border:1px solid var(--line); background:transparent;}
  .btn-outline{display:flex; align-items:center; gap:6px; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:500; color:var(--text); border:1px solid var(--line); background:var(--surface2); font-family:'Space Grotesk',sans-serif;}

  /* Login */
  .login-shell{padding:40px 20px; display:flex; justify-content:center;}
  .login-card{width:100%; max-width:380px; border-radius:16px; padding:24px; background:var(--surface); border:1px solid var(--line); animation:fadeUp .45s ease both;}
  .pw-wrap{position:relative;}
  .pw-toggle{position:absolute; right:8px; top:50%; transform:translateY(-50%); background:transparent; color:var(--muted); padding:2px;}

  /* Tabs */
  .tabs{display:flex; gap:4px; padding:4px; border-radius:12px; background:var(--surface); width:fit-content;}
  .tabs button{display:flex; align-items:center; gap:8px; padding:8px 16px; border-radius:8px; font-size:14px; font-weight:500; background:transparent; color:var(--muted); font-family:'Space Grotesk',sans-serif;}
  .tabs button.active{background:var(--amber); color:var(--bg);}

  /* Event list */
  .event-card{border-radius:16px; overflow:hidden; background:var(--surface); border:1px solid var(--line);}
  .event-head{width:100%; display:flex; align-items:center; justify-content:space-between; padding:12px 16px; text-align:left; background:transparent; color:inherit;}
  .event-body{padding:4px 16px 16px; border-top:1px solid var(--line);}
  .part-row{display:flex; align-items:center; gap:8px; flex-wrap:wrap; padding:8px 12px; border-radius:8px; background:var(--surface2); margin-bottom:8px;}
  .part-input{width:96px; padding:4px 8px; border-radius:6px; font-size:12px;}

  .progress-track{width:100%; height:8px; border-radius:999px; overflow:hidden; background:var(--surface2); margin-bottom:12px;}
  .progress-fill{height:100%; border-radius:999px; transition:width .3s;}

  .acc-row{display:flex; align-items:center; justify-content:space-between; border-radius:12px; padding:12px 16px; background:var(--surface2); border:1px solid var(--line); margin-bottom:8px;}
  .acc-avatar{width:32px;height:32px;border-radius:999px;display:flex;align-items:center;justify-content:center;}

  .footer-note{padding:16px 20px; text-align:center; color:var(--muted); font-size:11px;}
  @media(min-width:640px){.footer-note{padding:16px 32px;}}

  .grid2{display:grid; grid-template-columns:1fr; gap:12px;}
  @media(min-width:640px){.grid2{grid-template-columns:1fr 1fr;}}

  .conn-banner{padding:8px 20px; text-align:center; font-size:12px; background:rgba(232,163,61,0.14); color:var(--amber); border-bottom:1px solid rgba(232,163,61,0.35);}

  /* ---------- Welcome screen ---------- */
  .welcome-shell{
    min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
    padding:32px 20px; position:relative; overflow:hidden; text-align:center;
  }
  .glow{position:absolute; border-radius:999px; filter:blur(70px); opacity:0.35; pointer-events:none;}
  .glow-amber{width:280px; height:280px; background:var(--amber); top:-60px; left:-60px; animation:driftA 9s ease-in-out infinite;}
  .glow-teal{width:320px; height:320px; background:var(--teal); bottom:-80px; right:-80px; animation:driftB 11s ease-in-out infinite;}
  @keyframes driftA{0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,20px);}}
  @keyframes driftB{0%,100%{transform:translate(0,0);} 50%{transform:translate(-25px,-15px);}}

  .welcome-logo{
    width:64px;height:64px;border-radius:18px;background:var(--amber);
    display:flex;align-items:center;justify-content:center; margin-bottom:22px;
    animation:logoPop .6s cubic-bezier(.34,1.56,.64,1) both, floatGlow 3.2s ease-in-out 0.6s infinite;
    box-shadow:0 0 0 rgba(232,163,61,0.5);
    position:relative; z-index:1;
  }
  @keyframes logoPop{ from{opacity:0; transform:scale(0.4) rotate(-8deg);} to{opacity:1; transform:scale(1) rotate(0deg);} }
  @keyframes floatGlow{ 0%,100%{transform:translateY(0); box-shadow:0 8px 24px rgba(232,163,61,0.15);} 50%{transform:translateY(-6px); box-shadow:0 16px 32px rgba(232,163,61,0.28);} }

  .welcome-eyebrow{
    color:var(--muted); font-size:12px; letter-spacing:0.16em; text-transform:uppercase; margin:0 0 8px;
    animation:fadeUp .5s ease .05s both; position:relative; z-index:1;
  }
  .welcome-title{
    font-size:clamp(30px,7vw,46px); font-weight:700; letter-spacing:-0.03em; margin:0 0 10px;
    background:linear-gradient(100deg, var(--text) 20%, var(--amber) 45%, var(--teal) 65%, var(--text) 85%);
    background-size:220% auto; -webkit-background-clip:text; background-clip:text; color:transparent;
    animation:fadeUp .5s ease .1s both, shimmer 5s linear 0.6s infinite;
    position:relative; z-index:1;
  }
  @keyframes shimmer{ to{ background-position:-220% center; } }
  .welcome-sub{
    color:var(--muted); font-size:14px; max-width:360px; margin:0 0 36px; line-height:1.6;
    animation:fadeUp .5s ease .18s both; position:relative; z-index:1;
  }
  .role-grid{
    display:grid; grid-template-columns:1fr; gap:12px; width:100%; max-width:360px;
    position:relative; z-index:1;
  }
  .role-card{
    display:flex; align-items:center; gap:14px; padding:16px 18px; border-radius:16px;
    background:var(--surface); border:1px solid var(--line); text-align:left; color:inherit;
    transition:border-color .18s, transform .12s, background .18s;
    animation:fadeUp .5s ease both;
  }
  .role-card:nth-child(1){animation-delay:.26s;}
  .role-card:nth-child(2){animation-delay:.34s;}
  .role-card:nth-child(3){animation-delay:.42s;}
  .role-card:hover{transform:translateY(-2px); background:var(--surface2);}
  .role-card:active{transform:scale(0.98);}
  .role-icon{
    width:42px; height:42px; border-radius:12px; display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .role-name{font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:15px; margin:0;}
  .role-desc{color:var(--muted); font-size:12px; margin:2px 0 0;}
  .role-arrow{margin-left:auto; color:var(--muted); flex-shrink:0; transition:transform .15s, color .15s;}
  .role-card:hover .role-arrow{transform:translateX(3px); color:var(--text);}

  .welcome-foot{
    color:var(--muted); font-size:11px; margin-top:28px; position:relative; z-index:1;
    animation:fadeUp .5s ease .5s both;
  }

  @keyframes fadeUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }

  .app-fade{animation:appFade .35s ease both;}
  @keyframes appFade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }

  .tutorial-card{
    border-radius:16px; padding:16px; background:rgba(232,163,61,0.08); border:1px solid rgba(232,163,61,0.3);
  }
  .tutorial-steps{margin:0; padding-left:18px; color:var(--text); font-size:13px; line-height:1.9;}
  .tutorial-steps li{margin-bottom:2px;}
  .tutorial-steps b{color:var(--amber); font-weight:600;}

  /* Queue-ready toast */
  .queue-toast{
    position:fixed; top:12px; left:12px; right:12px; z-index:9998; max-width:420px; margin:0 auto;
    display:flex; align-items:flex-start; gap:10px; padding:14px 14px;
    background:var(--surface); border:1px solid rgba(232,163,61,0.45); border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.35);
    animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  .queue-toast-icon{font-size:20px; line-height:1;}
  .queue-toast-title{margin:0; font-family:'Space Grotesk',sans-serif; font-weight:600; font-size:13px; color:var(--text);}
  .queue-toast-body{margin:2px 0 0; font-size:12px; color:var(--muted); line-height:1.5;}
  .queue-toast-close{background:transparent; color:var(--muted); padding:2px; flex-shrink:0;}
  .queue-toast-hide{ animation:toastOut .35s ease both; }
  @keyframes toastIn{ from{opacity:0; transform:translateY(-16px) scale(0.96);} to{opacity:1; transform:translateY(0) scale(1);} }
  @keyframes toastOut{ from{opacity:1; transform:translateY(0);} to{opacity:0; transform:translateY(-12px);} }
</style>
</head>
<body>

<div id="app">
  <div class="conn-banner">Menyambungkan ke server…</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot,
  collection, addDoc, updateDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

/* ---------- Firebase init ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyB674t6fiJ8HT9ENfeS3Vzv-BSGQTQ-3BI",
  authDomain: "rapi-dev-43ddf.firebaseapp.com",
  projectId: "rapi-dev-43ddf",
  storageBucket: "rapi-dev-43ddf.firebasestorage.app",
  messagingSenderId: "392684134756",
  appId: "1:392684134756:web:6ef9ed85f4fb29db29da71"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const accountsRef = doc(db, "rapiTeam", "accounts");
const statusRef = doc(db, "rapiTeam", "status");
const eventsRef = collection(db, "rapiTeamEvents");

/* ---------- Data & palette ---------- */
const palette = {
  bg:"#0F1B22", surface:"#16272F", surface2:"#1D323B", line:"#2A3E46",
  amber:"#E8A33D", teal:"#4FB0A5", text:"#EDE7DA", muted:"#8FA3AB", danger:"#D9705C",
};
const rupiah = (n) => "Rp" + (Number(n) || 0).toLocaleString("id-ID");

const DEFAULT_ACCOUNTS = [
  { name: "Rapi", role: "Owner", password: "rapi2026" },
  { name: "Nizam", role: "Admin", password: "nizam123" },
  { name: "Vivi", role: "Admin", password: "vivi123" },
  { name: "Nanau", role: "Admin", password: "nanau123" },
  { name: "Michelle", role: "Admin", password: "michelle123" },
];

const ROLE_META = {
  owner:  { label:"Owner", icon:"crown",        tone:"amber", desc:"Kendali penuh atas tim & akun Admin." },
  admin:  { label:"Admin", icon:"shield-check", tone:"teal",  desc:"Kelola acara, peserta & pembayaran." },
  member: { label:"Member", icon:"users",       tone:"muted", desc:"Konfirmasi kehadiran acara, tanpa login." },
};

/* ---------- App state ---------- */
let state = {
  ready: false, // becomes true once first data arrives from Firestore
  now: new Date(),
  screen: "welcome", // "welcome" | "app"
  role: null,        // "owner" | "admin" | "member"
  tab: "acara",
  accounts: [],
  session: null,
  loginName: "",
  loginPassword: "",
  loginError: "",
  showPw: false,
  pwCurrent: "",
  pwNew: "",
  pwMsg: "",
  queueCount: 0,
  pushMode: false,
  groupOpen: true,
  events: [],
  expanded: null,
  copiedId: null,
  partInputs: {},
  form: { judul:"", tanggal:"", waktu:"", lokasi:"", biayaText:"Gratis", biayaNominal:"", kuota:"", batas:"" },
  debugMsg: "",
  saving: false,
  showMemberTutorial: true,
  notifPermission: (typeof Notification !== "undefined") ? Notification.permission : "unsupported",
};

function setState(patch) { Object.assign(state, patch); render(); }

/* ---------- Queue-ready notification (sound + toast + browser notification) ---------- */
function playQueueBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = "sine";
    o.connect(g); g.connect(ctx.destination);
    g.gain.setValueAtTime(0.001, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.18, ctx.currentTime + 0.02);
    o.frequency.setValueAtTime(880, ctx.currentTime);
    o.frequency.setValueAtTime(1175, ctx.currentTime + 0.14);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.45);
    o.start();
    o.stop(ctx.currentTime + 0.46);
  } catch (e) { /* audio not available, ignore */ }
}
function showQueueToast() {
  const el = document.createElement("div");
  el.className = "queue-toast";
  el.innerHTML = `
    <div class="queue-toast-icon">🔔</div>
    <div style="flex:1; min-width:0;">
      <p class="queue-toast-title">Antrian sudah 10!</p>
      <p class="queue-toast-body">Owner udah kasih 10 permintaan masuk — boleh diterima sekaligus.</p>
    </div>
    <button class="queue-toast-close" aria-label="Tutup">✕</button>
  `;
  document.body.appendChild(el);
  el.querySelector(".queue-toast-close").onclick = () => el.remove();
  setTimeout(() => {
    el.classList.add("queue-toast-hide");
    setTimeout(() => el.remove(), 400);
  }, 8000);
}
function notifyQueueReady() {
  playQueueBeep();
  showQueueToast();
  if (typeof Notification !== "undefined" && Notification.permission === "granted") {
    try {
      new Notification("RAPI TEAM", {
        body: "Owner udah kasih 10 permintaan masuk — boleh diterima sekaligus.",
      });
    } catch (e) { /* some browsers require a service worker for this, ignore */ }
  }
}
async function enableQueueNotifications() {
  if (typeof Notification === "undefined") {
    setState({ debugMsg: "⚠️ Browser ini gak dukung notifikasi HP." });
    return;
  }
  const perm = await Notification.requestPermission();
  setState({ notifPermission: perm });
}

/* ---------- Global error surfacing (debug aid) ---------- */
window.addEventListener("error", (e) => {
  const banner = document.createElement("div");
  banner.style.cssText = "position:fixed; bottom:0; left:0; right:0; background:#D9705C; color:#0F1B22; font-size:12px; padding:10px 16px; z-index:9999; word-break:break-word;";
  banner.textContent = "JS Error: " + (e.message || "unknown") + " (" + (e.filename||"") + ":" + (e.lineno||"") + ")";
  document.body.appendChild(banner);
});
window.addEventListener("unhandledrejection", (e) => {
  const banner = document.createElement("div");
  banner.style.cssText = "position:fixed; bottom:0; left:0; right:0; background:#D9705C; color:#0F1B22; font-size:12px; padding:10px 16px; z-index:9999; word-break:break-word;";
  banner.textContent = "Promise Error: " + (e.reason?.message || e.reason || "unknown");
  document.body.appendChild(banner);
});

/* ---------- Firestore live sync ---------- */
onSnapshot(accountsRef, async (snap) => {
  if (snap.exists() && snap.data().list) {
    state.accounts = snap.data().list;
  } else {
    await setDoc(accountsRef, { list: DEFAULT_ACCOUNTS });
    state.accounts = DEFAULT_ACCOUNTS;
  }
  state.ready = true;
  render();
}, (err) => {
  document.getElementById("app").innerHTML = `<div class="conn-banner" style="background:rgba(217,112,92,0.14); color:${palette.danger};">Gagal konek ke server: ${err.message}</div>`;
});

let prevQueueReady = false;
onSnapshot(statusRef, async (snap) => {
  if (snap.exists()) {
    const d = snap.data();
    state.queueCount = d.queueCount ?? 0;
    state.pushMode = d.pushMode ?? false;
    state.groupOpen = d.groupOpen ?? true;
  } else {
    await setDoc(statusRef, { queueCount: 0, pushMode: false, groupOpen: true });
  }
  const isReady = state.queueCount >= 10 && !state.pushMode;
  const isStaffLoggedIn = (state.role === "owner" || state.role === "admin") && !!state.session;
  if (isReady && !prevQueueReady && isStaffLoggedIn) {
    notifyQueueReady();
  }
  prevQueueReady = isReady;
  render();
});

onSnapshot(eventsRef, (snap) => {
  const list = snap.docs.map(d => ({ id: d.id, ...d.data() }));
  // newest first (by createdAt if present, fallback keep order)
  list.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
  state.events = list;
  render();
});

/* ---------- Role / navigation ---------- */
function accountsForRole(role) {
  // Owner picks from accounts literally marked "Owner"; Admin picks from accounts marked "Admin".
  const wanted = role === "owner" ? "Owner" : "Admin";
  return state.accounts.filter(a => a.role === wanted);
}

function selectRole(role) {
  const patch = { role, screen: "app", loginError: "", loginPassword: "" };
  if (role === "member") {
    // Member never touches account data — straight into the confirmation view.
    setState(patch);
    return;
  }
  const list = accountsForRole(role);
  patch.loginName = list[0] ? list[0].name : "";
  setState(patch);
}

function backToWelcome() {
  setState({ screen: "welcome", role: null, session: null, loginError: "", loginPassword: "", pwMsg: "" });
}

/* ---------- Actions ---------- */
async function saveAccounts(list) {
  state.accounts = list;
  await setDoc(accountsRef, { list });
}
async function saveStatus(patch) {
  Object.assign(state, patch);
  render();
  await setDoc(statusRef, { queueCount: state.queueCount, pushMode: state.pushMode, groupOpen: state.groupOpen });
}

function doLogin() {
  const allowedList = accountsForRole(state.role);
  const acc = allowedList.find(a => a.name === state.loginName);
  if (!acc) {
    setState({ loginError: `Akun ini bukan ${ROLE_META[state.role].label.toLowerCase()}.` });
    return;
  }
  if (acc.password === state.loginPassword) {
    setState({ session: { name: acc.name, role: acc.role }, loginError: "", loginPassword: "" });
    // Ask for notification permission right away, while we still have the tap's
    // "user gesture" — browsers silently ignore the prompt if it's requested later
    // without one, so this is the most reliable moment to ask.
    enableQueueNotifications();
  } else {
    setState({ loginError: "Nama atau password salah." });
  }
}
function doLogout() { backToWelcome(); }

async function changePassword() {
  const acc = state.accounts.find(a => a.name === state.session?.name);
  if (!acc || acc.password !== state.pwCurrent) { setState({ pwMsg: "Password lama salah." }); return; }
  if (!state.pwNew.trim()) { setState({ pwMsg: "Password baru tidak boleh kosong." }); return; }
  const list = state.accounts.map(a => a.name === state.session.name ? { ...a, password: state.pwNew.trim() } : a);
  await saveAccounts(list);
  setState({ pwCurrent: "", pwNew: "", pwMsg: "Password berhasil diganti." });
}

async function submitEvent() {
  if (!state.form.judul.trim()) { setState({ debugMsg: "⚠️ Isi dulu Nama kegiatan sebelum simpan." }); return; }
  const payload = { ...state.form, participants: [], createdAt: Date.now() };
  setState({ saving: true, debugMsg: "" });
  try {
    const docRef = await addDoc(eventsRef, payload);
    setState({
      saving: false,
      debugMsg: "✅ Acara tersimpan (id: " + docRef.id + ")",
      form: { judul:"", tanggal:"", waktu:"", lokasi:"", biayaText:"Gratis", biayaNominal:"", kuota:"", batas:"" },
      expanded: docRef.id
    });
  } catch (err) {
    console.error(err);
    setState({ saving: false, debugMsg: "❌ Gagal simpan acara — " + (err.code || "") + " " + err.message });
  }
}
async function removeEvent(id) {
  try {
    await deleteDoc(doc(db, "rapiTeamEvents", id));
    setState({ expanded: state.expanded === id ? null : state.expanded });
  } catch (err) {
    alert("Gagal hapus acara: " + err.message);
    console.error(err);
  }
}
async function copyEventText(e) {
  try {
    await navigator.clipboard.writeText(buildEventText(e));
    setState({ copiedId: e.id });
    setTimeout(() => setState({ copiedId: null }), 1800);
  } catch {}
}
function getPartInput(eid) {
  return state.partInputs[eid] || { name:"", due: (state.events.find(e => e.id===eid)?.biayaNominal) || "" };
}
function setPartInput(eid, patch) {
  state.partInputs[eid] = { ...getPartInput(eid), ...patch };
}
async function addParticipant(eid) {
  const input = getPartInput(eid);
  if (!input.name.trim()) return;
  const e = state.events.find(x => x.id === eid);
  if (!e) return;
  const nameTrim = input.name.trim();
  const alreadyJoined = e.participants.some(p => p.name.toLowerCase() === nameTrim.toLowerCase());
  if (alreadyJoined) return;
  const participant = { id: Date.now().toString(), name: nameTrim, due: Number(input.due)||0, paid: 0 };
  const newParticipants = [...e.participants, participant];
  try {
    await updateDoc(doc(db, "rapiTeamEvents", eid), { participants: newParticipants });
    setPartInput(eid, { name:"", due: input.due });
    render();
  } catch (err) {
    alert("Gagal tambah peserta: " + err.message);
    console.error(err);
  }
}
async function updateParticipant(eid, pid, patch) {
  const e = state.events.find(x => x.id === eid);
  if (!e) return;
  const newParticipants = e.participants.map(p => p.id === pid ? { ...p, ...patch } : p);
  try {
    await updateDoc(doc(db, "rapiTeamEvents", eid), { participants: newParticipants });
  } catch (err) {
    alert("Gagal update peserta: " + err.message);
    console.error(err);
  }
}
async function removeParticipant(eid, pid) {
  const e = state.events.find(x => x.id === eid);
  if (!e) return;
  const newParticipants = e.participants.filter(p => p.id !== pid);
  try {
    await updateDoc(doc(db, "rapiTeamEvents", eid), { participants: newParticipants });
  } catch (err) {
    alert("Gagal hapus peserta: " + err.message);
    console.error(err);
  }
}

/* ---------- Small render helpers ---------- */
function chip(text, tone, extraStyle) {
  const tones = {
    muted: `background:rgba(143,163,171,0.12); color:${palette.muted}; border-color:${palette.line};`,
    amber: `background:rgba(232,163,61,0.14); color:${palette.amber}; border-color:rgba(232,163,61,0.35);`,
    teal: `background:rgba(79,176,165,0.14); color:${palette.teal}; border-color:rgba(79,176,165,0.35);`,
    danger: `background:rgba(217,112,92,0.14); color:${palette.danger}; border-color:rgba(217,112,92,0.35);`,
  };
  return `<span class="chip" style="${tones[tone]}${extraStyle||""}">${text}</span>`;
}
function esc(str) {
  return String(str ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
}

          <p style="color:${palette.muted}; font-size:12px; margin:0 0 12px;">Hanya akun terdaftar ini yang bisa login ke panel — nggak bisa ditambah member sembarangan.</p>
          <div>
            ${s.accounts.map(a => `
              <div class="acc-row">
                <div class="flex items-center gap-3">
                  <div class="acc-avatar" style="background:${a.role==='Owner'?'rgba(232,163,61,0.16)':'rgba(79,176,165,0.16)'};">
                    <i data-lucide="${a.role==='Owner'?'crown':'shield-check'}" size="14" color="${a.role==='Owner'?palette.amber:palette.teal}"></i>
                  </div>
                  <div>
                    <p style="font-size:14px; font-weight:500; margin:0;">${esc(a.name)}${a.name===s.session.name?" (kamu)":""}</p>
                    ${chip(esc(a.role), a.role==='Owner'?'amber':'teal', 'margin-top:4px;')}
                  </div>
                </div>
              </div>
            `).join("")}
          </div>
        </div>
        <div class="card">
          <h2 class="display" style="font-size:15px; font-weight:600; margin:0 0 10px;">Ganti password kamu (${esc(s.session.name)})</h2>
          <div class="grid2" style="margin-bottom:12px;">
            <input class="input" type="password" placeholder="Password lama" value="${esc(s.pwCurrent)}" oninput="state.pwCurrent=this.value" />
            <input class="input" type="password" placeholder="Password baru" value="${esc(s.pwNew)}" oninput="state.pwNew=this.value" />
          </div>
          ${s.pwMsg ? `<p style="color:${s.pwMsg.includes('berhasil')?palette.teal:palette.danger}; font-size:12px; margin-bottom:8px;">${esc(s.pwMsg)}</p>` : ""}
          <button class="btn-amber" onclick="changePassword()"><i data-lucide="lock" size="14"></i> Simpan password baru</button>
        </div>
      </div>`;
    }

    html += `</div>`;
  }

  if (s.role === "member") {
    html += `<div class="px" style="padding-top:24px; padding-bottom:24px; max-width:600px;">
      <h2 class="display" style="font-size:15px; font-weight:600; margin:0 0 4px;">Acara yang bisa diikuti</h2>
      <p style="color:${palette.muted}; font-size:13px; margin:0 0 16px;">Pilih acara, isi nama, lalu konfirmasi ikut.</p>
      ${s.showMemberTutorial ? `
        <div class="tutorial-card" style="margin-bottom:16px;">
          <div class="flex items-center justify-between" style="margin-bottom:10px;">
            <div class="flex items-center gap-2">
              <i data-lucide="sparkles" size="15" color="${palette.amber}"></i>
              <span class="display" style="font-weight:600; font-size:13px;">Cara konfirmasi ikut</span>
            </div>
            <button onclick="setState({showMemberTutorial:false})" style="background:transparent; color:${palette.muted}; padding:2px;"><i data-lucide="x" size="15"></i></button>
          </div>
          <ol class="tutorial-steps">
            <li>Kamu udah di link yang benar ✅ (halaman ini)</li>
            <li>Cari acara yang mau diikuti di bawah</li>
            <li>Isi kolom <b>"Nama kamu"</b> di kartu acara itu</li>
            <li>Tap tombol <b>"Konfirmasi ikut"</b> — selesai, gak perlu bikin akun</li>
          </ol>
        </div>
      ` : ""}
      ${s.events.length===0 ? `
        <div class="card-dashed"><p style="color:${palette.muted}; font-size:13px; margin:0;">Belum ada acara yang dibuat Admin.</p></div>
      ` : `
      <div style="display:flex; flex-direction:column; gap:12px;">
        ${s.events.map(e => {
          const pInput = getPartInput(e.id);
          const nameTrim = pInput.name.trim();
          const alreadyJoined = nameTrim !== "" && e.participants.some(p => p.name.toLowerCase() === nameTrim.toLowerCase());
          return `<div class="card">
            <p class="display" style="font-size:15px; font-weight:600; margin:0;">${esc(e.judul || "(tanpa nama)")}</p>
            <div class="flex flex-wrap gap-3" style="margin:4px 0 12px; color:${palette.muted}; font-size:12px;">
              ${e.tanggal?`<span>📅 ${esc(e.tanggal)}</span>`:""}
              ${e.waktu?`<span>⏰ ${esc(e.waktu)}</span>`:""}
              ${e.lokasi?`<span>📍 ${esc(e.lokasi)}</span>`:""}
            </div>
            <div class="flex flex-wrap gap-2" style="margin-bottom:12px;">
              ${chip(`💰 ${esc(e.biayaText || "-")}`, "amber")}
              ${e.kuota?chip(`👥 kuota ${esc(e.kuota)}`,"muted"):""}
              ${e.batas?chip(`⏳ batas ${esc(e.batas)}`,"muted"):""}
              ${chip(`${e.participants.length} sudah konfirmasi`,"teal")}
            </div>
            <div class="flex gap-2 flex-wrap">
              <input class="input" style="flex:1; min-width:140px;" placeholder="Nama kamu" value="${esc(pInput.name)}"
                oninput="setPartInput('${e.id}',{name:this.value}); refreshJoinButton('${e.id}')" id="member-input-${e.id}" />
              <button class="${alreadyJoined?'btn-outline':'btn-teal'}" id="member-btn-${e.id}" ${alreadyJoined?'disabled':''} onclick="addParticipant('${e.id}')">
                <i data-lucide="check" size="14"></i> ${alreadyJoined?"Sudah ikut":"Konfirmasi ikut"}
              </button>
            </div>
            ${e.participants.length>0?`<p style="color:${palette.muted}; font-size:11px; margin-top:8px;">Sudah konfirmasi: ${e.participants.map(p=>esc(p.name)).join(", ")}</p>`:""}
          </div>`;
        }).join("")}
      </div>
      `}
    </div>`;
  }

  html += `<div class="footer-note">Semua data (akun, acara, peserta, pembayaran) tersimpan di Firestore dan sinkron otomatis di semua perangkat.</div>`;
  html += `</div>`;

  document.getElementById("app").innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

function refreshJoinButton(eid) {
  const input = document.getElementById(`member-input-${eid}`);
  const btn = document.getElementById(`member-btn-${eid}`);
  if (!input || !btn) return;
  const e = state.events.find(x => x.id === eid);
  if (!e) return;
  const nameTrim = input.value.trim();
  const alreadyJoined = nameTrim !== "" && e.participants.some(p => p.name.toLowerCase() === nameTrim.toLowerCase());
  btn.disabled = alreadyJoined;
  btn.className = alreadyJoined ? "btn-outline" : "btn-teal";
  btn.innerHTML = `<i data-lucide="check" size="14"></i> ${alreadyJoined ? "Sudah ikut" : "Konfirmasi ikut"}`;
  if (window.lucide) lucide.createIcons();
}

setInterval(() => { state.now = new Date(); render(); }, 30000);

/* expose functions used by inline onclick/oninput handlers */
window.state = state;
window.setState = setState;
window.selectRole = selectRole;
window.backToWelcome = backToWelcome;
window.enableQueueNotifications = enableQueueNotifications;
window.saveStatus = saveStatus;
window.doLogin = doLogin;
window.doLogout = doLogout;
window.changePassword = changePassword;
window.submitEvent = submitEvent;
window.removeEvent = removeEvent;
window.copyEventText = copyEventText;
window.setPartInput = setPartInput;
window.addParticipant = addParticipant;
window.updateParticipant = updateParticipant;
window.removeParticipant = removeParticipant;
window.refreshJoinButton = refreshJoinButton;

render();
</script>
</body>
</html>
