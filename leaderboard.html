<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Papan Peringkat — RAPI TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root{
--bg:#0F1B22; --surface:#16272F; --surface2:#1D323B; --line:#2A3E46;
--amber:#E8A33D; --teal:#4FB0A5; --text:#EDE7DA; --muted:#8FA3AB; --danger:#D9705C;
--gold:#F0C24B; --silver:#C7CDD1; --bronze:#D08A52;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); min-height:100vh;}
.display{font-family:'Space Grotesk',sans-serif;}
::selection{background:rgba(232,163,61,0.35);}
.page-glow{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
.glow{position:absolute; border-radius:999px; filter:blur(80px); opacity:0.3;}
.glow-amber{width:300px; height:300px; background:var(--amber); top:-70px; left:-70px; animation:driftA 10s ease-in-out infinite;}
.glow-teal{width:340px; height:340px; background:var(--teal); bottom:-90px; right:-80px; animation:driftB 12s ease-in-out infinite;}
@keyframes driftA{0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,24px);}}
@keyframes driftB{0%,100%{transform:translate(0,0);} 50%{transform:translate(-26px,-18px);}}
#app{position:relative; z-index:1; max-width:560px; margin:0 auto;}
.header{padding:32px 20px 8px; text-align:center;}
.hero-icon{width:52px;height:52px;border-radius:14px;background:rgba(232,163,61,0.16); display:flex; align-items:center; justify-content:center; margin:0 auto 14px;}
.hero-title{font-size:clamp(20px,5.6vw,26px); font-weight:700; letter-spacing:-0.02em; margin:0 0 8px;}
.hero-sub{color:var(--muted); font-size:13px; max-width:400px; margin:0 auto; line-height:1.6;}
.section{padding:20px 16px 40px;}
.podium{display:flex; align-items:flex-end; gap:8px; margin-bottom:20px;}
.podium-card{flex:1; border-radius:14px; padding:14px 8px 12px; text-align:center; background:var(--surface); border:1px solid var(--line); position:relative; animation:fadeUp .4s ease both;}
.podium-card.p1{padding-top:20px; border-color:var(--gold);}
.podium-card.p2{border-color:var(--silver);}
.podium-card.p3{border-color:var(--bronze);}
.medal{font-size:26px; line-height:1; margin-bottom:6px;}
.podium-name{font-size:12.5px; font-weight:600; margin:0 0 2px; word-break:break-word;}
.podium-points{font-size:11px; color:var(--amber); font-family:'JetBrains Mono',monospace;}
.list-card{border-radius:16px; background:var(--surface); border:1px solid var(--line); overflow:hidden; animation:fadeUp .4s ease both;}
.row{display:flex; align-items:center; gap:12px; padding:13px 16px; border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.rank{width:26px; text-align:center; font-family:'JetBrains Mono',monospace; color:var(--muted); font-size:13px; flex-shrink:0;}
.row-info{flex:1; min-width:0;}
.row-name{font-size:14px; font-weight:600; margin:0 0 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
.badge{display:inline-block; font-size:10px; padding:2px 8px; border-radius:999px; font-weight:600;}
.badge-pemula{background:rgba(143,163,171,0.18); color:var(--muted);}
.badge-aktif{background:rgba(79,176,165,0.16); color:var(--teal);}
.badge-senior{background:rgba(232,163,61,0.16); color:var(--amber);}
.badge-legend{background:rgba(217,112,92,0.16); color:var(--danger);}
.row-points{font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:600; color:var(--amber); flex-shrink:0;}
.empty{text-align:center; color:var(--muted); font-size:13px; padding:40px 20px;}
.loading{text-align:center; color:var(--muted); font-size:13px; padding:40px 20px;}
@keyframes fadeUp{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>
<div class="page-glow"><div class="glow glow-amber"></div><div class="glow glow-teal"></div></div>
<div id="app">
<div class="header">
<div class="hero-icon"><i data-lucide="trophy" size="24" color="#E8A33D"></i></div>
<h1 class="display hero-title">Papan Peringkat</h1>
<p class="hero-sub">Ranking member paling aktif di Rapi Team. Makin aktif, makin naik level!</p>
</div>
<div class="section" id="content">
<div class="loading"><i data-lucide="loader-2" size="18"></i> Memuat papan peringkat...</div>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, collection, getDocs, query, orderBy, limit } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB674t6fiJ8HT9ENfeS3Vzv-BSGQTQ-3BI",
authDomain: "rapi-dev-43ddf.firebaseapp.com",
projectId: "rapi-dev-43ddf",
storageBucket: "rapi-dev-43ddf.firebasestorage.app",
messagingSenderId: "392684134756",
appId: "1:392684134756:web:6ef9ed85f4fb29db29da71"
};

const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

function esc(str) {
return String(str ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
}

function getLevel(points) {
if (points >= 350) return { name: "Legend", cls: "legend" };
if (points >= 150) return { name: "Senior", cls: "senior" };
if (points >= 50) return { name: "Aktif", cls: "aktif" };
return { name: "Pemula", cls: "pemula" };
}

const MEDALS = ["🥇", "🥈", "🥉"];

async function loadLeaderboard() {
const content = document.getElementById("content");
try {
const q = query(collection(db, "rapiTeamMembers"), orderBy("points", "desc"), limit(50));
const snap = await getDocs(q);
const members = [];
snap.forEach(d => {
const data = d.data();
members.push({ nama: data.nama || "Tanpa Nama", points: data.points || 0 });
});

if (members.length === 0) {
content.innerHTML = `<div class="empty">Belum ada member dengan poin. Ayo jadi yang pertama! 🚀</div>`;
return;
}

const top3 = members.slice(0, 3);
const rest = members.slice(3);

let podiumHtml = "";
if (top3.length > 0) {
const order = [1, 0, 2].filter(i => top3[i]); // tampilkan urutan 2-1-3 secara visual
podiumHtml = `<div class="podium">${order.map(i => {
const m = top3[i];
const lvl = getLevel(m.points);
return `<div class="podium-card p${i+1}">
<div class="medal">${MEDALS[i]}</div>
<p class="podium-name">${esc(m.nama)}</p>
<p class="podium-points">${m.points} pts</p>
</div>`;
}).join("")}</div>`;
}

let listHtml = `<div class="list-card">${rest.map((m, idx) => {
const lvl = getLevel(m.points);
return `<div class="row">
<div class="rank">${idx + 4}</div>
<div class="row-info">
<p class="row-name">${esc(m.nama)}</p>
<span class="badge badge-${lvl.cls}">${lvl.name}</span>
</div>
<div class="row-points">${m.points}</div>
</div>`;
}).join("")}</div>`;

content.innerHTML = podiumHtml + (rest.length > 0 ? listHtml : "");
if (window.lucide) lucide.createIcons();
} catch (e) {
content.innerHTML = `<div class="empty">Gagal memuat papan peringkat: ${esc(e.message)}</div>`;
}
}

loadLeaderboard();
if (window.lucide) lucide.createIcons();
</script>
</body>
</html>
