<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kartu Profil — RAPI TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
:root{
  --bg:#0F1B22; --surface:#16272F; --surface2:#1D323B; --line:#2A3E46;
  --amber:#E8A33D; --teal:#4FB0A5; --text:#EDE7DA; --muted:#8FA3AB; --danger:#D9705C;
}
*{box-sizing:border-box;}
body{margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); min-height:100vh;}
.display{font-family:'Space Grotesk',sans-serif;}
.mono{font-family:'JetBrains Mono',monospace;}
button{cursor:pointer; border:none; font-family:inherit;}
input{font-family:inherit;}
::selection{background:rgba(232,163,61,0.35);}
.page-glow{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
.glow{position:absolute; border-radius:999px; filter:blur(80px); opacity:0.3;}
.glow-amber{width:300px; height:300px; background:var(--amber); top:-70px; left:-70px; animation:driftA 10s ease-in-out infinite;}
.glow-teal{width:340px; height:340px; background:var(--teal); bottom:-90px; right:-80px; animation:driftB 12s ease-in-out infinite;}
@keyframes driftA{0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,24px);}}
@keyframes driftB{0%,100%{transform:translate(0,0);} 50%{transform:translate(-26px,-18px);}}
#app{position:relative; z-index:1; max-width:560px; margin:0 auto;}
.header{padding:28px 20px 18px; border-bottom:1px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap;}
@media(min-width:640px){.header{padding:28px 32px 18px;}}
.logo-box{width:32px;height:32px;border-radius:8px;background:var(--amber);display:flex;align-items:center;justify-content:center; flex-shrink:0;}
.brand-title{font-size:19px; font-weight:700; letter-spacing:-0.02em; margin:0;}
.brand-sub{color:var(--muted); font-size:12px; margin:2px 0 0 40px;}
.btn-back{display:flex; align-items:center; gap:6px; padding:7px 14px; border-radius:8px; font-size:13px; font-weight:500; color:var(--text); border:1px solid var(--line); background:var(--surface); font-family:'Space Grotesk',sans-serif; text-decoration:none; transition:background .15s;}
.btn-back:hover{background:var(--surface2);}
.section{padding:24px 20px; animation:fadeUp .4s ease both;}
@media(min-width:640px){.section{padding:24px 32px;}}
.card{border-radius:16px; padding:18px; background:var(--surface); border:1px solid var(--line); margin-bottom:14px;}
.field-label{color:var(--muted); font-size:12px; display:block; margin-bottom:6px;}
.input{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; outline:none; transition:border-color .15s;}
.input:focus{border-color:var(--amber);}
.btn-amber{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 18px; border-radius:8px; font-size:14px; font-weight:500; background:var(--amber); color:var(--bg); font-family:'Space Grotesk',sans-serif; transition:transform .12s, filter .12s; width:100%; margin-top:6px;}
.btn-amber:hover{filter:brightness(1.08);} .btn-amber:active{transform:scale(0.98);}
.btn-amber:disabled{opacity:0.5; cursor:not-allowed;}
.btn-teal{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:10px 14px; border-radius:8px; font-size:13.5px; font-weight:500; background:var(--teal); color:var(--bg); font-family:'Space Grotesk',sans-serif; transition:filter .12s, transform .12s; flex:1;}
.btn-teal:hover{filter:brightness(1.08);} .btn-teal:active{transform:scale(0.96);}
.btn-row{display:flex; gap:10px; margin-top:12px;}
.msg{font-size:12.5px; margin-top:8px; padding:8px 10px; border-radius:8px;}
.msg-ok{background:rgba(79,176,165,0.14); color:var(--teal);}
.msg-err{background:rgba(217,112,92,0.14); color:var(--danger);}
.section-title{display:flex; align-items:center; gap:8px; margin:0 0 12px;}
.section-title h2{font-family:'Space Grotesk',sans-serif; font-size:15px; font-weight:600; margin:0;}
.hidden{display:none !important;}
#cardWrap{width:100%; border-radius:16px; overflow:hidden; border:1px solid var(--line); background:var(--surface2); display:flex; justify-content:center; padding:10px;}
#profileCanvas{width:100%; height:auto; border-radius:10px; display:block;}
@keyframes fadeUp{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
</style>
</head>
<body>
<div class="page-glow"><div class="glow glow-amber"></div><div class="glow glow-teal"></div></div>
<div id="app">

<div class="header">
  <div>
    <div style="display:flex; align-items:center; gap:10px;">
      <div class="logo-box"><i data-lucide="badge-check" size="18" color="#0F1B22"></i></div>
      <h1 class="display brand-title">Kartu Profil</h1>
    </div>
    <p class="brand-sub">Bikin kartu profil digital kamu</p>
  </div>
  <a class="btn-back" href="index.html"><i data-lucide="arrow-left" size="14"></i> Kembali</a>
</div>

<div class="section">

  <div class="card" id="formCard">
    <div class="section-title"><i data-lucide="phone" size="16" color="#E8A33D"></i><h2>Masukkan Nomor WA Kamu</h2></div>
    <input class="input" id="waInput" type="tel" placeholder="08xxxxxxxxxx" />
    <button class="btn-amber" id="btnBuat" onclick="buatKartu()"><i data-lucide="sparkles" size="15"></i> Buat Kartu Profil</button>
    <div id="formMsg"></div>
  </div>

  <div id="resultCard" class="hidden">
    <div id="cardWrap">
      <canvas id="profileCanvas" width="1000" height="600"></canvas>
    </div>
    <div class="btn-row">
      <button class="btn-teal" onclick="downloadKartu()"><i data-lucide="download" size="15"></i> Unduh</button>
      <button class="btn-teal" onclick="shareKartu()"><i data-lucide="share-2" size="15"></i> Share</button>
    </div>
    <div id="shareMsg"></div>
  </div>

</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, collection, query, where, getCountFromServer
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB674t6fiJ8HT9ENfeS3Vzv-BSGQTQ-3BI",
  authDomain: "rapi-dev-43ddf.firebaseapp.com",
  projectId: "rapi-dev-43ddf",
  storageBucket: "rapi-dev-43ddf.firebasestorage.app",
  messagingSenderId: "392684134756",
  appId: "1:392684134756:web:6ef9ed85f4fb29db29da71"
};
const db = getFirestore(initializeApp(firebaseConfig));
const membersCol = collection(db, "rapiTeamMembers");

function normalizeWa(raw) {
  let n = raw.replace(/[^0-9]/g, "");
  if (n.startsWith("0")) n = "62" + n.slice(1);
  if (n.startsWith("8")) n = "62" + n;
  return n;
}
function esc(str) {
  return String(str ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
}
function showMsg(elId, text, ok) {
  document.getElementById(elId).innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${esc(text)}</div>`;
}
function badgeFor(poin) {
  if (poin >= 50) return { label: "LEGEND", color: "#E8A33D" };
  if (poin >= 20) return { label: "GOLD", color: "#E8C468" };
  if (poin >= 5) return { label: "SILVER", color: "#B9C6CC" };
  return { label: "BRONZE", color: "#C08552" };
}
function formatDate(ts) {
  try {
    if (!ts) return "-";
    const d = ts.toDate ? ts.toDate() : new Date(ts);
    if (isNaN(d.getTime())) return "-";
    return d.toLocaleDateString("id-ID", { day: "2-digit", month: "short", year: "numeric" });
  } catch (e) { return "-"; }
}

let lastCanvas = null;

window.buatKartu = async function () {
  const raw = document.getElementById("waInput").value.trim();
  const btn = document.getElementById("btnBuat");
  if (!raw || raw.replace(/[^0-9]/g, "").length < 9) {
    showMsg("formMsg", "Nomor WA belum valid.", false);
    return;
  }
  const waId = normalizeWa(raw);
  btn.disabled = true;
  btn.innerHTML = `<i data-lucide="loader-2" size="15"></i> Membuat...`;
  if (window.lucide) lucide.createIcons();

  try {
    const snap = await getDoc(doc(membersCol, waId));
    if (!snap.exists()) {
      showMsg("formMsg", "Nomor kamu belum terdaftar di Rapi Team.", false);
    } else {
      const data = snap.data();
      let refCount = 0;
      try {
        const cq = query(membersCol, where("referred_by", "==", waId));
        const countSnap = await getCountFromServer(cq);
        refCount = countSnap.data().count;
      } catch (e) { /* biarin 0 kalau gagal */ }

      const joinDate = formatDate(data.createdAt || data.created_at || data.joinedAt || data.tanggal_daftar || null);
      drawCard({
        nama: data.nama || "Member Rapi Team",
        wa: waId,
        poin: data.poin || 0,
        role: data.role || "member",
        refCount,
        joinDate
      });
      document.getElementById("formMsg").innerHTML = "";
      document.getElementById("resultCard").classList.remove("hidden");
    }
  } catch (e) {
    showMsg("formMsg", "Gagal ambil data: " + e.message, false);
  }
  btn.disabled = false;
  btn.innerHTML = `<i data-lucide="sparkles" size="15"></i> Buat Kartu Profil`;
  if (window.lucide) lucide.createIcons();
};

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawCard({ nama, wa, poin, role, refCount, joinDate }) {
  const canvas = document.getElementById("profileCanvas");
  const ctx = canvas.getContext("2d");
  const W = canvas.width, H = canvas.height;
  lastCanvas = canvas;

  // background
  const bgGrad = ctx.createLinearGradient(0, 0, W, H);
  bgGrad.addColorStop(0, "#0F1B22");
  bgGrad.addColorStop(1, "#16272F");
  ctx.fillStyle = bgGrad;
  roundRect(ctx, 0, 0, W, H, 28);
  ctx.fill();

  // glow blobs
  const glow1 = ctx.createRadialGradient(120, 80, 0, 120, 80, 260);
  glow1.addColorStop(0, "rgba(232,163,61,0.28)");
  glow1.addColorStop(1, "rgba(232,163,61,0)");
  ctx.fillStyle = glow1;
  ctx.fillRect(0, 0, W, H);

  const glow2 = ctx.createRadialGradient(W - 100, H - 90, 0, W - 100, H - 90, 300);
  glow2.addColorStop(0, "rgba(79,176,165,0.26)");
  glow2.addColorStop(1, "rgba(79,176,165,0)");
  ctx.fillStyle = glow2;
  ctx.fillRect(0, 0, W, H);

  // border
  ctx.strokeStyle = "rgba(232,163,61,0.5)";
  ctx.lineWidth = 3;
  roundRect(ctx, 6, 6, W - 12, H - 12, 24);
  ctx.stroke();

  // brand
  ctx.fillStyle = "#E8A33D";
  roundRect(ctx, 48, 44, 44, 44, 12);
  ctx.fill();
  ctx.fillStyle = "#0F1B22";
  ctx.font = "700 22px 'Space Grotesk'";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText("R", 70, 68);

  ctx.textAlign = "left";
  ctx.fillStyle = "#EDE7DA";
  ctx.font = "700 26px 'Space Grotesk'";
  ctx.fillText("RAPI TEAM", 108, 62);
  ctx.fillStyle = "#8FA3AB";
  ctx.font = "500 15px 'JetBrains Mono'";
  ctx.fillText("KARTU PROFIL DIGITAL", 108, 84);

  // badge tier di kanan atas
  const badge = badgeFor(poin);
  ctx.font = "700 15px 'Space Grotesk'";
  const badgeText = badge.label;
  const badgeW = ctx.measureText(badgeText).width + 36;
  ctx.fillStyle = "rgba(255,255,255,0.06)";
  roundRect(ctx, W - 48 - badgeW, 46, badgeW, 40, 999);
  ctx.fill();
  ctx.strokeStyle = badge.color;
  ctx.lineWidth = 1.5;
  roundRect(ctx, W - 48 - badgeW, 46, badgeW, 40, 999);
  ctx.stroke();
  ctx.fillStyle = badge.color;
  ctx.textAlign = "center";
  ctx.fillText(badgeText, W - 48 - badgeW / 2, 66);

  // avatar inisial
  const initials = nama.trim().split(/\s+/).slice(0, 2).map(w => w[0]?.toUpperCase() || "").join("");
  const avX = 120, avY = 250, avR = 72;
  const avGrad = ctx.createLinearGradient(avX - avR, avY - avR, avX + avR, avY + avR);
  avGrad.addColorStop(0, "#E8A33D");
  avGrad.addColorStop(1, "#4FB0A5");
  ctx.beginPath();
  ctx.arc(avX, avY, avR, 0, Math.PI * 2);
  ctx.fillStyle = avGrad;
  ctx.fill();
  ctx.fillStyle = "#0F1B22";
  ctx.font = "700 48px 'Space Grotesk'";
  ctx.textAlign = "center";
  ctx.textBaseline = "middle";
  ctx.fillText(initials || "R", avX, avY + 4);

  // nama & wa & role
  ctx.textAlign = "left";
  ctx.textBaseline = "alphabetic";
  ctx.fillStyle = "#EDE7DA";
  ctx.font = "700 32px 'Space Grotesk'";
  ctx.fillText(nama, 230, 232);
  ctx.fillStyle = "#4FB0A5";
  ctx.font = "500 18px 'JetBrains Mono'";
  ctx.fillText("+" + wa, 230, 264);
  ctx.fillStyle = "#8FA3AB";
  ctx.font = "500 15px 'Inter'";
  ctx.fillText(role === "admin" ? "Admin Rapi Team" : "Member Rapi Team", 230, 290);

  // divider
  ctx.strokeStyle = "rgba(255,255,255,0.08)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(48, 370);
  ctx.lineTo(W - 48, 370);
  ctx.stroke();

  // stats row
  const stats = [
    { label: "POIN", value: String(poin) },
    { label: "REFERRAL", value: String(refCount) },
    { label: "GABUNG", value: joinDate }
  ];
  const colW = (W - 96) / 3;
  stats.forEach((s, i) => {
    const x = 48 + i * colW;
    ctx.fillStyle = "#E8A33D";
    ctx.font = "700 30px 'JetBrains Mono'";
    ctx.textAlign = "left";
    ctx.fillText(s.value, x, 430);
    ctx.fillStyle = "#8FA3AB";
    ctx.font = "500 13px 'Inter'";
    ctx.fillText(s.label, x, 454);
  });

  // footer motto
  ctx.fillStyle = "#8FA3AB";
  ctx.font = "500 14px 'Inter'";
  ctx.textAlign = "center";
  ctx.fillText('"Rapi Dalam Sikap, Solid Dalam Kebersamaan."', W / 2, H - 40);
}

window.downloadKartu = function () {
  if (!lastCanvas) return;
  const link = document.createElement("a");
  link.download = "kartu-profil-rapi-team.png";
  link.href = lastCanvas.toDataURL("image/png");
  link.click();
};

window.shareKartu = async function () {
  if (!lastCanvas) return;
  try {
    const blob = await new Promise(res => lastCanvas.toBlob(res, "image/png"));
    const file = new File([blob], "kartu-profil-rapi-team.png", { type: "image/png" });
    if (navigator.canShare && navigator.canShare({ files: [file] })) {
      await navigator.share({
        files: [file],
        title: "Kartu Profil Rapi Team",
        text: "Ini kartu profil digital aku di Rapi Team ⚡"
      });
    } else {
      showMsg("shareMsg", "Perangkat ini nggak support share gambar langsung, coba tombol Unduh lalu share manual ya.", false);
    }
  } catch (e) {
    if (e.name !== "AbortError") showMsg("shareMsg", "Gagal share: " + e.message, false);
  }
};

if (window.lucide) lucide.createIcons();
document.querySelector('link[href*="fonts.googleapis"]').addEventListener('load', () => {});
</script>
</body>
</html>
