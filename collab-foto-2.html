<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>RAPI TEAM — Kirim Foto Collab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root{
    --bg:#0F1B22; --surface:#16272F; --surface2:#1D323B; --line:#2A3E46;
    --amber:#E8A33D; --teal:#4FB0A5; --text:#EDE7DA; --muted:#8FA3AB; --danger:#D9705C;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); min-height:100vh;}
  .display{font-family:'Space Grotesk',sans-serif;}
  .mono{font-family:'JetBrains Mono',monospace;}
  .wrap{max-width:520px; margin:0 auto; padding:24px 20px 40px;}
  .flex{display:flex;} .items-center{align-items:center;} .justify-between{justify-content:space-between;}
  .gap-1{gap:4px;} .gap-2{gap:8px;} .gap-3{gap:12px;} .flex-wrap{flex-wrap:wrap;}
  .rounded-md{border-radius:8px;} .rounded-lg{border-radius:12px;} .rounded-xl{border-radius:16px;} .rounded-full{border-radius:999px;}
  button{cursor:pointer; font-family:inherit; border:none;}
  input, select{font-family:inherit;}
  input:focus, select:focus, button:focus-visible{ outline:2px solid var(--amber); outline-offset:1px; }
  button:disabled{cursor:not-allowed; opacity:0.55;}

  .header{display:flex; align-items:center; gap:12px; margin-bottom:20px;}
  .logo-box{width:36px;height:36px;border-radius:10px;background:var(--amber);display:flex;align-items:center;justify-content:center; flex-shrink:0;}
  .brand-title{font-size:18px; font-weight:700; letter-spacing:-0.02em; margin:0;}
  .brand-sub{color:var(--muted); font-size:12px; margin:2px 0 0;}

  .card{border-radius:16px; padding:18px; background:var(--surface); border:1px solid var(--line); margin-bottom:14px;}
  .card-dashed{border-radius:16px; padding:20px; text-align:center; background:var(--surface); border:1px dashed var(--line);}
  .field-label{color:var(--muted); font-size:12px; display:block; margin-bottom:4px;}
  .input{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; outline:none; transition:border-color .15s;}
  .input:focus{border-color:var(--amber);}
  .btn-amber{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 16px; border-radius:8px; font-size:14px; font-weight:600; background:var(--amber); color:var(--bg); font-family:'Space Grotesk',sans-serif; width:100%; transition:filter .12s, transform .12s;}
  .btn-amber:hover{filter:brightness(1.08);} .btn-amber:active{transform:scale(0.98);}
  .btn-teal{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:11px 16px; border-radius:8px; font-size:14px; font-weight:600; background:var(--teal); color:var(--bg); font-family:'Space Grotesk',sans-serif; width:100%;}
  .btn-outline{display:inline-flex; align-items:center; gap:6px; padding:8px 12px; border-radius:8px; font-size:12px; font-weight:500; color:var(--text); border:1px solid var(--line); background:var(--surface2); font-family:'Space Grotesk',sans-serif;}
  .btn-outline-danger{display:inline-flex; align-items:center; gap:6px; padding:6px 10px; border-radius:8px; font-size:11px; font-weight:500; color:var(--danger); border:1px solid var(--line); background:transparent;}
  .link-btn{background:transparent; color:var(--muted); font-size:12px; text-decoration:underline; padding:4px;}

  .chip{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid;}
  .chip-amber{background:rgba(232,163,61,0.14); color:var(--amber); border-color:rgba(232,163,61,0.35);}
  .chip-teal{background:rgba(79,176,165,0.14); color:var(--teal); border-color:rgba(79,176,165,0.35);}
  .chip-danger{background:rgba(217,112,92,0.14); color:var(--danger); border-color:rgba(217,112,92,0.35);}
  .chip-muted{background:rgba(143,163,171,0.12); color:var(--muted); border-color:var(--line);}

  .reason-list{margin:0; padding-left:0; list-style:none; display:flex; flex-direction:column; gap:10px;}
  .reason-list li{display:flex; gap:10px; align-items:flex-start; font-size:13px; color:var(--text); line-height:1.55;}
  .reason-list i{flex-shrink:0; margin-top:2px; color:var(--teal);}

  .countdown{font-family:'JetBrains Mono',monospace; font-size:26px; font-weight:600; letter-spacing:0.02em; text-align:center; margin:6px 0 2px;}
  .countdown-label{text-align:center; color:var(--muted); font-size:12px; margin-bottom:2px;}

  .upload-box{border:1px dashed var(--line); border-radius:14px; padding:18px; text-align:center; background:var(--surface2); cursor:pointer; transition:border-color .15s;}
  .upload-box:hover{border-color:var(--amber);}
  .upload-box img{max-width:100%; max-height:220px; border-radius:10px; display:block; margin:0 auto;}

  .photo-row{display:flex; align-items:center; gap:12px; padding:10px; border-radius:12px; background:var(--surface2); border:1px solid var(--line); margin-bottom:8px;}
  .photo-thumb{width:52px; height:52px; border-radius:8px; object-fit:cover; flex-shrink:0; background:var(--surface);}

  .toggle{display:inline-flex; align-items:center; gap:8px; cursor:pointer; font-size:13px;}
  .toggle input{width:38px; height:22px; -webkit-appearance:none; appearance:none; background:var(--surface2); border:1px solid var(--line); border-radius:999px; position:relative; cursor:pointer; transition:background .15s;}
  .toggle input:checked{background:var(--teal);}
  .toggle input::before{content:''; position:absolute; width:16px; height:16px; border-radius:999px; background:var(--text); top:2px; left:2px; transition:transform .15s;}
  .toggle input:checked::before{transform:translateX(16px);}

  .footer-note{text-align:center; color:var(--muted); font-size:11px; margin-top:24px;}
  .top-toggle{display:flex; justify-content:flex-end; margin-bottom:10px;}

  .spinner{width:16px;height:16px;border:2px solid rgba(15,27,34,0.3);border-top-color:var(--bg);border-radius:50%;display:inline-block;animation:spin .7s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .tutorial-card{border-radius:16px; padding:16px; background:rgba(232,163,61,0.08); border:1px solid rgba(232,163,61,0.3); margin-bottom:14px;}
  .tutorial-steps{margin:0; padding-left:18px; color:var(--text); font-size:13px; line-height:1.9;}
  .tutorial-steps li{margin-bottom:2px;}
  .tutorial-steps b{color:var(--amber); font-weight:600;}
  .toast-close{background:transparent; color:var(--muted); padding:2px;}
  .broadcast-box{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:12px; border-radius:10px; font-size:12px; line-height:1.6; white-space:pre-wrap; font-family:'JetBrains Mono',monospace; resize:vertical; min-height:150px;}

  /* ---------- Animasi ---------- */
  .page-glow{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  .glow{position:absolute; border-radius:999px; filter:blur(80px); opacity:0.28;}
  .glow-amber{width:280px; height:280px; background:var(--amber); top:-70px; left:-70px; animation:driftA 10s ease-in-out infinite;}
  .glow-teal{width:320px; height:320px; background:var(--teal); bottom:-90px; right:-80px; animation:driftB 12s ease-in-out infinite;}
  @keyframes driftA{0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,24px);}}
  @keyframes driftB{0%,100%{transform:translate(0,0);} 50%{transform:translate(-26px,-18px);}}
  .wrap{position:relative; z-index:1;}

  @keyframes fadeUp{ from{opacity:0; transform:translateY(14px);} to{opacity:1; transform:translateY(0);} }
  .anim-card{animation:fadeUp .45s cubic-bezier(.22,1,.36,1) both;}

  .hero-logo{
    animation:logoPop .55s cubic-bezier(.34,1.56,.64,1) both, floatGlow 3s ease-in-out .55s infinite;
    box-shadow:0 8px 22px rgba(232,163,61,0.18);
  }
  @keyframes logoPop{ from{opacity:0; transform:scale(0.4) rotate(-10deg);} to{opacity:1; transform:scale(1) rotate(0deg);} }
  @keyframes floatGlow{ 0%,100%{transform:translateY(0); box-shadow:0 6px 18px rgba(232,163,61,0.16);} 50%{transform:translateY(-3px); box-shadow:0 12px 26px rgba(232,163,61,0.3);} }

  .live-dot{width:7px; height:7px; border-radius:999px; background:var(--teal); display:inline-block; position:relative;}
  .live-dot::after{content:''; position:absolute; inset:0; border-radius:999px; background:var(--teal); animation:pulseDot 1.6s ease-out infinite;}
  @keyframes pulseDot{ 0%{transform:scale(1); opacity:0.7;} 100%{transform:scale(2.6); opacity:0;} }

  .countdown.tick{animation:tickBump .35s ease;}
  @keyframes tickBump{ 0%{transform:scale(1);} 30%{transform:scale(1.08);} 100%{transform:scale(1);} }

  .cta-glow{animation:ctaGlow 2.2s ease-in-out infinite;}
  @keyframes ctaGlow{ 0%,100%{box-shadow:0 0 0 rgba(79,176,165,0.0);} 50%{box-shadow:0 0 0 8px rgba(79,176,165,0.12);} }

  .check-pop{animation:checkPop .5s cubic-bezier(.34,1.56,.64,1) both;}
  @keyframes checkPop{ from{opacity:0; transform:scale(0.4);} to{opacity:1; transform:scale(1);} }

  .upload-box{transition:border-color .15s, transform .15s;}
  .upload-box:active{transform:scale(0.98);}
  .upload-box img{animation:fadeUp .3s ease both;}

  .toast{
    position:fixed; top:14px; left:12px; right:12px; z-index:9999; max-width:420px; margin:0 auto;
    display:flex; align-items:center; gap:10px; padding:12px 14px;
    background:var(--surface); border:1px solid rgba(79,176,165,0.4); border-radius:14px;
    box-shadow:0 10px 28px rgba(0,0,0,0.35);
    animation:toastIn .35s cubic-bezier(.34,1.56,.64,1) both;
  }
  .toast p{margin:0; font-size:13px; font-weight:500;}
  .toast-hide{animation:toastOut .3s ease both;}
  @keyframes toastIn{ from{opacity:0; transform:translateY(-16px) scale(0.96);} to{opacity:1; transform:translateY(0) scale(1);} }
  @keyframes toastOut{ from{opacity:1; transform:translateY(0);} to{opacity:0; transform:translateY(-12px);} }
</style>
</head>
<body>
<div class="page-glow"><div class="glow glow-amber"></div><div class="glow glow-teal"></div></div>
<div id="app"><div class="wrap"><p style="color:var(--muted); font-size:13px;">Menyambungkan ke server…</p></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import {
  getFirestore, doc, setDoc, onSnapshot,
  collection, addDoc, deleteDoc
} from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

/* ---------- Firebase init (project sama dengan Panel Kendali) ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyB674t6fiJ8HT9ENfeS3Vzv-BSGQTQ-3BI",
  authDomain: "rapi-dev-43ddf.firebaseapp.com",
  projectId: "rapi-dev-43ddf",
  storageBucket: "rapi-dev-43ddf.firebasestorage.app",
  messagingSenderId: "392684134756",
  appId: "1:392684134756:web:6ef9ed85f4fb29db29da71"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

const accountsRef = doc(db, "rapiTeam", "accounts");
const sessionRef  = doc(db, "rapiTeam", "collabSession");
const photosRef   = collection(db, "rapiTeamCollabPhotos");

const esc = (s="") => String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const pad = n => String(n).padStart(2,"0");
const MAX_BASE64_BYTES = 850 * 1024; // batas aman di bawah limit 1MB per dokumen Firestore

/* ---------- State ---------- */
let state = {
  ready:false,
  now: new Date(),
  view: "member", // member | admin-login | admin

  session: null, // {judul,tanggal,jamMulai,jamSelesai,aktif}
  photos: [],

  // member form
  name:"", file:null, previewUrl:null, submitting:false, submitError:"", submitted:false, compressPct:0,
  showTutorial:true,

  // admin
  accounts:[], loginName:"", loginPassword:"", loginError:"", adminSession:null,
  formJudul:"", formTanggal:"", formJamMulai:"07:00", formJamSelesai:"12:00", formAktif:true,
  savingSession:false, savedMsg:"", copyMsg:"",
};
function setState(p){ Object.assign(state,p); render(); }

/* ---------- Firestore live sync ---------- */
onSnapshot(accountsRef, (snap) => {
  if (snap.exists()) state.accounts = snap.data().list || [];
  state.ready = true;
  render();
});
onSnapshot(sessionRef, (snap) => {
  if (snap.exists()) {
    state.session = snap.data();
    if (!state.formTanggal) {
      const s = snap.data();
      state.formJudul = s.judul || "";
      state.formTanggal = s.tanggal || "";
      state.formJamMulai = s.jamMulai || "07:00";
      state.formJamSelesai = s.jamSelesai || "12:00";
      state.formAktif = s.aktif ?? true;
    }
  } else {
    state.session = null;
  }
  render();
});
onSnapshot(photosRef, (snap) => {
  const list = snap.docs.map(d => ({ id:d.id, ...d.data() }));
  list.sort((a,b) => (b.submittedAt||0) - (a.submittedAt||0));
  state.photos = list;
  render();
});
let lastStatus = null;
setInterval(() => {
  state.now = new Date();
  const newStatus = getStatus();
  if (newStatus !== lastStatus) {
    render(); // status berubah (mis. jadi "open" atau "expired") -> render ulang penuh
  } else {
    tickCountdown(); // masih status sama -> update angka countdown aja, animasi lain nggak keganggu
  }
}, 1000);
function tickCountdown() {
  const el = document.getElementById("countdownNum");
  if (!el || !state.session) return;
  const s = state.session;
  const status = getStatus();
  let text = "";
  if (status === "not_started") text = diffParts(state.now, new Date(`${s.tanggal}T${s.jamMulai}:00`));
  else if (status === "open") text = diffParts(state.now, new Date(`${s.tanggal}T${s.jamSelesai}:00`));
  else return;
  el.textContent = text;
  el.classList.remove("tick");
  void el.offsetWidth;
  el.classList.add("tick");
}

/* ---------- Toast kecil buat feedback (salin teks/link) ---------- */
function showToast(message, icon) {
  const el = document.createElement("div");
  el.className = "toast";
  el.innerHTML = `<i data-lucide="${icon || 'check-circle-2'}" size="18" color="var(--teal)"></i><p>${esc(message)}</p>`;
  document.body.appendChild(el);
  if (window.lucide) lucide.createIcons();
  setTimeout(() => {
    el.classList.add("toast-hide");
    setTimeout(() => el.remove(), 350);
  }, 2200);
}

/* ---------- Status sesi ---------- */
function getStatus() {
  const s = state.session;
  if (!s || !s.tanggal || !s.aktif) return "inactive";
  const start = new Date(`${s.tanggal}T${(s.jamMulai||"07:00")}:00`);
  const end   = new Date(`${s.tanggal}T${(s.jamSelesai||"12:00")}:00`);
  const now = state.now;
  if (now < start) return "not_started";
  if (now >= start && now <= end) return "open";
  return "expired";
}
function diffParts(from, to) {
  let ms = Math.max(0, to - from);
  const h = Math.floor(ms/3600000); ms -= h*3600000;
  const m = Math.floor(ms/60000); ms -= m*60000;
  const sec = Math.floor(ms/1000);
  return `${pad(h)}:${pad(m)}:${pad(sec)}`;
}
function fmtTanggal(t) {
  if (!t) return "-";
  const d = new Date(`${t}T00:00:00`);
  return d.toLocaleDateString("id-ID", { weekday:"long", day:"numeric", month:"long", year:"numeric" });
}
function fmtJam(ms) {
  const d = new Date(ms);
  return d.toLocaleTimeString("id-ID", { hour:"2-digit", minute:"2-digit" });
}

/* ---------- Kompres foto di browser (tanpa Storage, langsung disimpan di Firestore) ---------- */
function loadImageFile(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => { URL.revokeObjectURL(url); resolve(img); };
    img.onerror = reject;
    img.src = url;
  });
}
async function compressToDataURL(file) {
  const img = await loadImageFile(file);
  let width = img.width, height = img.height;
  const maxDim = 1280;
  if (width > maxDim || height > maxDim) {
    const scale = maxDim / Math.max(width, height);
    width = Math.round(width * scale);
    height = Math.round(height * scale);
  }
  const canvas = document.createElement("canvas");
  const ctx = canvas.getContext("2d");
  let quality = 0.8, dataUrl = "";
  let attempts = 0;
  while (attempts < 8) {
    canvas.width = width; canvas.height = height;
    ctx.clearRect(0,0,width,height);
    ctx.drawImage(img, 0, 0, width, height);
    dataUrl = canvas.toDataURL("image/jpeg", quality);
    const approxBytes = dataUrl.length * 0.75;
    if (approxBytes <= MAX_BASE64_BYTES) break;
    if (quality > 0.4) quality -= 0.1;
    else { width = Math.round(width * 0.85); height = Math.round(height * 0.85); }
    attempts++;
  }
  return dataUrl;
}

/* ---------- Member: pilih & upload foto ---------- */
function onFilePicked(input) {
  const file = input.files && input.files[0];
  if (!file) return;
  if (!file.type.startsWith("image/")) { setState({ submitError:"File harus berupa foto/gambar." }); return; }
  const url = URL.createObjectURL(file);
  setState({ file, previewUrl:url, submitError:"" });
}
async function submitPhoto() {
  if (getStatus() !== "open") { setState({ submitError:"Waktu pengiriman sudah tidak aktif." }); return; }
  const nameTrim = state.name.trim();
  if (!nameTrim) { setState({ submitError:"Isi nama kamu dulu ya." }); return; }
  if (!state.file) { setState({ submitError:"Pilih foto dulu ya." }); return; }
  setState({ submitting:true, submitError:"" });
  try {
    const s = state.session;
    const dataUrl = await compressToDataURL(state.file);
    if (dataUrl.length * 0.75 > 950 * 1024) {
      setState({ submitting:false, submitError:"Foto masih terlalu besar setelah dikompres, coba pakai foto lain." });
      return;
    }
    await addDoc(photosRef, {
      name: nameTrim,
      photoBase64: dataUrl,
      tanggal: s.tanggal,
      submittedAt: Date.now(),
    });
    setState({ submitting:false, submitted:true, file:null, previewUrl:null });
  } catch (e) {
    setState({ submitting:false, submitError:"Gagal mengirim foto: " + e.message });
  }
}
function resetMemberForm() {
  setState({ name:"", file:null, previewUrl:null, submitError:"", submitted:false });
}

/* ---------- Link & teks broadcast untuk grup WA ---------- */
function getShareLink() {
  return `${location.origin}${location.pathname}`;
}
function buildBroadcastText(s) {
  return `📸 COLLAB FOTO — RAPI TEAM 📸

Halo semua! Yuk kirim foto collab kalian buat "${s.judul}" 🙌

📅 ${fmtTanggal(s.tanggal)}
⏰ Dibuka ${s.jamMulai} — ditutup ${s.jamSelesai} WIB

Kirim fotonya lewat link di bawah ini ya (bukan ke WA Admin langsung), biar nggak numpuk chat & nomor Admin aman dari spam:
${getShareLink()}

Caranya gampang kok, tinggal buka link → isi nama → pilih 1 foto → tap Kirim Foto. Ada tutorialnya juga di websitenya.

⚠️ Kirim sebelum jam ${s.jamSelesai} ya, lewat dari itu link otomatis kadaluwarsa dan gak bisa kirim foto lagi.`;
}
async function copyPlainText(text) {
  if (navigator.clipboard && window.isSecureContext) {
    await navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
  }
}
async function copyBroadcastText() {
  if (!state.session) return;
  try {
    await copyPlainText(buildBroadcastText(state.session));
    showToast("Teks broadcast berhasil disalin!");
  } catch (e) { showToast("Gagal menyalin, coba salin manual.", "alert-triangle"); }
}
async function copyShareLink() {
  try {
    await copyPlainText(getShareLink());
    showToast("Link berhasil disalin!");
  } catch (e) { showToast("Gagal menyalin, coba salin manual.", "alert-triangle"); }
}

/* ---------- Admin: login & kontrol sesi ---------- */
function doAdminLogin() {
  const acc = state.accounts.find(a => a.name === state.loginName && (a.role === "Owner" || a.role === "Admin"));
  if (!acc) { setState({ loginError:"Akun tidak ditemukan." }); return; }
  if (acc.password !== state.loginPassword) { setState({ loginError:"Password salah." }); return; }
  setState({ adminSession:{ name:acc.name, role:acc.role }, view:"admin", loginError:"", loginPassword:"" });
}
function adminLogout() {
  setState({ adminSession:null, view:"member", loginName:"", loginPassword:"" });
}
async function saveSession() {
  if (!state.formTanggal) { setState({ savedMsg:"Tanggal wajib diisi." }); return; }
  setState({ savingSession:true, savedMsg:"" });
  await setDoc(sessionRef, {
    judul: state.formJudul.trim() || "Collab Foto Rapi Team",
    tanggal: state.formTanggal,
    jamMulai: state.formJamMulai || "07:00",
    jamSelesai: state.formJamSelesai || "12:00",
    aktif: !!state.formAktif,
  });
  setState({ savingSession:false, savedMsg:"Sesi berhasil disimpan." });
}
async function deletePhoto(id) {
  if (!confirm("Hapus foto ini?")) return;
  await deleteDoc(doc(db, "rapiTeamCollabPhotos", id));
}

/* ---------- Render ---------- */
function render() {
  const app = document.getElementById("app");
  if (!state.ready) { app.innerHTML = `<div class="wrap"><p style="color:var(--muted); font-size:13px;">Menyambungkan ke server…</p></div>`; return; }

  const status = getStatus();
  lastStatus = status;
  let html = `<div class="wrap">`;

  html += `<div class="header">
    <div class="logo-box hero-logo"><i data-lucide="camera" size="18" color="#0F1B22"></i></div>
    <div><p class="brand-title">RAPI TEAM</p><p class="brand-sub">Kirim Foto Collab</p></div>
  </div>`;

  html += `<div class="top-toggle">
    ${state.view === "admin"
      ? `<button class="link-btn" onclick="adminLogout()">Keluar dari mode Admin</button>`
      : `<button class="link-btn" onclick="setState({view: state.view==='member'?'admin-login':'member'})">${state.view==='member' ? 'Masuk sebagai Admin' : '← Kembali ke halaman Member'}</button>`
    }
  </div>`;

  if (state.view === "admin-login") {
    html += `<div class="card anim-card">
      <p class="display" style="font-weight:600; margin:0 0 12px;">Login Admin / Owner</p>
      ${state.loginError ? `<p style="color:var(--danger); font-size:12px; margin-bottom:10px;">${esc(state.loginError)}</p>` : ""}
      <label class="field-label">Nama akun</label>
      <select class="input" style="margin-bottom:10px;" onchange="setState({loginName:this.value})">
        ${state.accounts.filter(a=>a.role==="Owner"||a.role==="Admin").map(a=>`<option value="${esc(a.name)}" ${state.loginName===a.name?"selected":""}>${esc(a.name)} (${esc(a.role)})</option>`).join("")}
      </select>
      <label class="field-label">Password</label>
      <input class="input" style="margin-bottom:14px;" type="password" value="${esc(state.loginPassword)}" oninput="state.loginPassword=this.value" onkeydown="if(event.key==='Enter')doAdminLogin()" />
      <button class="btn-amber" onclick="doAdminLogin()"><i data-lucide="log-in" size="15"></i> Masuk</button>
    </div>`;
  }

  else if (state.view === "admin") {
    html += `<div class="card anim-card">
      <p class="display" style="font-weight:600; margin:0 0 4px;">Halo, ${esc(state.adminSession.name)} 👋</p>
      <p style="color:var(--muted); font-size:12px; margin:0 0 14px;">Atur jadwal sesi collab foto di bawah ini.</p>
      <label class="field-label">Judul sesi</label>
      <input class="input" style="margin-bottom:10px;" placeholder="Contoh: Collab Foto Meetup Juli" value="${esc(state.formJudul)}" oninput="state.formJudul=this.value" />
      <label class="field-label">Tanggal</label>
      <input class="input" style="margin-bottom:10px;" type="date" value="${esc(state.formTanggal)}" oninput="state.formTanggal=this.value" />
      <div class="flex gap-2" style="margin-bottom:12px;">
        <div style="flex:1;"><label class="field-label">Jam mulai</label><input class="input" type="time" value="${esc(state.formJamMulai)}" oninput="state.formJamMulai=this.value" /></div>
        <div style="flex:1;"><label class="field-label">Jam selesai</label><input class="input" type="time" value="${esc(state.formJamSelesai)}" oninput="state.formJamSelesai=this.value" /></div>
      </div>
      <label class="toggle" style="margin-bottom:14px;">
        <input type="checkbox" ${state.formAktif?"checked":""} onchange="state.formAktif=this.checked" />
        Sesi aktif (member bisa kirim foto selama jam buka)
      </label>
      ${state.savedMsg ? `<p style="color:var(--teal); font-size:12px; margin-bottom:10px;">${esc(state.savedMsg)}</p>` : ""}
      <button class="btn-amber" ${state.savingSession?"disabled":""} onclick="saveSession()">
        <i data-lucide="save" size="15"></i> ${state.savingSession?"Menyimpan…":"Simpan Sesi"}
      </button>
    </div>`;

    if (state.session && state.session.tanggal) {
      const broadcastText = buildBroadcastText(state.session);
      html += `<div class="card anim-card">
        <p class="display" style="font-weight:600; margin:0 0 4px;">Link buat disebar ke grup WA</p>
        <p style="color:var(--muted); font-size:12px; margin:0 0 12px;">Salin teksnya, paste langsung ke grup WA <b>Rapi Team</b>.</p>
        <textarea class="broadcast-box" readonly onclick="this.select()">${esc(broadcastText)}</textarea>
        <div class="flex gap-2" style="margin-top:12px;">
          <button class="btn-teal" onclick="copyBroadcastText()"><i data-lucide="copy" size="14"></i> Salin Teks</button>
          <button class="btn-outline" style="flex-shrink:0;" onclick="copyShareLink()"><i data-lucide="link" size="14"></i> Salin Link</button>
        </div>
      </div>`;
    }

    const sessionPhotos = state.photos.filter(p => !state.session || p.tanggal === state.session.tanggal);
    html += `<div class="card anim-card">
      <div class="flex items-center justify-between" style="margin-bottom:12px;">
        <p class="display" style="font-weight:600; margin:0;">Foto masuk (${sessionPhotos.length})</p>
        ${chipForStatus(status)}
      </div>
      ${sessionPhotos.length===0 ? `<p style="color:var(--muted); font-size:13px;">Belum ada foto yang dikirim member.</p>` : sessionPhotos.map(p => `
        <div class="photo-row">
          <img class="photo-thumb" src="${p.photoBase64}" alt="${esc(p.name)}" />
          <div style="flex:1; min-width:0;">
            <p style="margin:0; font-size:13px; font-weight:600;">${esc(p.name)}</p>
            <p style="margin:2px 0 0; color:var(--muted); font-size:11px;">Dikirim ${fmtJam(p.submittedAt)}</p>
          </div>
          <a class="btn-outline" href="${p.photoBase64}" download="${esc(p.name)}-collab.jpg"><i data-lucide="download" size="13"></i> Unduh</a>
          <button class="btn-outline-danger" onclick="deletePhoto('${p.id}')"><i data-lucide="trash-2" size="13"></i></button>
        </div>
      `).join("")}
      ${sessionPhotos.length>0 ? `<p style="color:var(--muted); font-size:11px; margin-top:10px;">Setelah diunduh, kirim manual foto pilihan kamu ke grup WA <b>Rapi Team</b>.</p>` : ""}
    </div>`;
  }

  else {
    // ---- MEMBER VIEW ----
    if (state.showTutorial) {
      html += `<div class="tutorial-card anim-card">
        <div class="flex items-center justify-between" style="margin-bottom:10px;">
          <div class="flex items-center gap-2">
            <i data-lucide="sparkles" size="15" color="var(--amber)"></i>
            <span class="display" style="font-weight:600; font-size:13px;">Cara kirim foto collab</span>
          </div>
          <button onclick="setState({showTutorial:false})" style="background:transparent; color:var(--muted); padding:2px;"><i data-lucide="x" size="15"></i></button>
        </div>
        <ol class="tutorial-steps">
          <li>Kamu udah di link yang benar ✅ (halaman ini)</li>
          <li>Isi kolom <b>"Nama kamu"</b> pakai nama lengkap / panggilan</li>
          <li>Tap kotak foto, lalu pilih <b>1 foto</b> collab dari galeri kamu</li>
          <li>Tap tombol <b>"Kirim Foto"</b> — tunggu sampai muncul tanda berhasil</li>
          <li>Selesai! Admin yang akan pilih & teruskan fotonya ke grup WA Rapi Team</li>
        </ol>
      </div>`;
    }
    if (!state.session) {
      html += `<div class="card-dashed anim-card"><p style="color:var(--muted); font-size:13px; margin:0;">Belum ada sesi collab foto yang dibuka Admin.</p></div>`;
    } else {
      const s = state.session;
      html += `<div class="card anim-card">
        <p class="display" style="font-weight:600; font-size:16px; margin:0 0 6px;">${esc(s.judul)}</p>
        <p style="color:var(--muted); font-size:13px; margin:0 0 10px;">📅 ${fmtTanggal(s.tanggal)}</p>
        <div class="flex gap-2 flex-wrap" style="margin-bottom:14px;">
          ${chip(`⏰ Buka ${esc(s.jamMulai)} – ${esc(s.jamSelesai)}`, "muted")}
          ${chipForStatus(status)}
        </div>
        ${countdownBlock(status, s)}
      </div>`;

      html += `<div class="card anim-card">
        <p class="display" style="font-weight:600; margin:0 0 12px; font-size:14px;">📌 Kenapa kirim foto lewat sini, bukan langsung ke WA Admin?</p>
        <ul class="reason-list">
          <li><i data-lucide="shield-check" size="16"></i> Biar nomor WA Admin nggak kebanjiran chat & foto dari banyak member sekaligus — ini yang paling sering bikin nomor kena <b>spam / diblokir WhatsApp</b>.</li>
          <li><i data-lucide="zap" size="16"></i> Lebih simpel & cepat — nggak perlu japri satu-satu, upload di sini aja, langsung tersimpan rapi.</li>
          <li><i data-lucide="send" size="16"></i> Semua foto masuk otomatis rapi tersimpan di satu tempat. Admin yang akan pilih & teruskan ke grup WA <b>Rapi Team</b>.</li>
        </ul>
      </div>`;

      if (status === "open") {
        if (state.submitted) {
          html += `<div class="card anim-card" style="text-align:center;">
            <i data-lucide="check-circle-2" size="34" color="var(--teal)" class="check-pop"></i>
            <p class="display" style="font-weight:600; margin:12px 0 4px;">Foto berhasil dikirim! 🎉</p>
            <p style="color:var(--muted); font-size:13px; margin:0 0 14px;">Terima kasih, ${esc(state.name)}. Admin akan meneruskan foto kamu ke grup WA Rapi Team.</p>
            <button class="btn-outline" onclick="resetMemberForm()"><i data-lucide="rotate-ccw" size="14"></i> Kirim foto lain</button>
          </div>`;
        } else {
          html += `<div class="card anim-card">
            <label class="field-label">Nama kamu</label>
            <input class="input" style="margin-bottom:14px;" placeholder="Nama lengkap / panggilan" value="${esc(state.name)}" oninput="state.name=this.value" />
            <label class="field-label">Foto collab</label>
            <label class="upload-box" style="display:block; margin-bottom:14px;">
              ${state.previewUrl
                ? `<img src="${state.previewUrl}" />`
                : `<div><i data-lucide="image-plus" size="26" color="var(--muted)"></i><p style="color:var(--muted); font-size:12px; margin:8px 0 0;">Tap untuk pilih 1 foto</p></div>`
              }
              <input type="file" accept="image/*" style="display:none;" onchange="onFilePicked(this)" />
            </label>
            ${state.submitError ? `<p style="color:var(--danger); font-size:12px; margin-bottom:10px;">${esc(state.submitError)}</p>` : ""}
            <button class="btn-teal ${state.submitting?'':'cta-glow'}" ${state.submitting?"disabled":""} onclick="submitPhoto()">
              ${state.submitting ? `<span class="spinner"></span> Mengompres & mengirim…` : `<i data-lucide="send" size="15"></i> Kirim Foto`}
            </button>
          </div>`;
        }
      } else if (status === "not_started") {
        html += `<div class="card-dashed anim-card"><p style="color:var(--muted); font-size:13px; margin:0;">Pengiriman foto belum dibuka. Balik lagi jam ${esc(s.jamMulai)} ya!</p></div>`;
      } else {
        html += `<div class="card-dashed anim-card">
          <i data-lucide="clock-alert" size="24" color="var(--danger)"></i>
          <p style="color:var(--danger); font-size:13px; font-weight:600; margin:8px 0 2px;">Waktu pengiriman sudah kadaluwarsa</p>
          <p style="color:var(--muted); font-size:12px; margin:0;">Sesi ini ditutup jam ${esc(s.jamSelesai)}. Tunggu sesi collab berikutnya dari Admin.</p>
        </div>`;
      }
    }
  }

  html += `<p class="footer-note">Foto tersimpan otomatis di server & bisa diunduh Admin kapan saja.</p>`;
  html += `</div>`;
  app.innerHTML = html;
  if (window.lucide) lucide.createIcons();
}

function chip(label, tone) {
  return `<span class="chip chip-${tone}">${label}</span>`;
}
function chipForStatus(status) {
  if (status === "open") return `<span class="chip chip-teal"><span class="live-dot"></span> Terbuka</span>`;
  if (status === "not_started") return chip("🕐 Belum mulai", "amber");
  if (status === "expired") return chip("🔴 Kadaluwarsa", "danger");
  return chip("⚪ Nonaktif", "muted");
}
function countdownBlock(status, s) {
  const now = state.now;
  if (status === "not_started") {
    const start = new Date(`${s.tanggal}T${s.jamMulai}:00`);
    return `<p class="countdown-label">Dibuka dalam</p><p class="countdown" id="countdownNum" style="color:var(--amber);">${diffParts(now, start)}</p>`;
  }
  if (status === "open") {
    const end = new Date(`${s.tanggal}T${s.jamSelesai}:00`);
    return `<p class="countdown-label">Ditutup dalam</p><p class="countdown" id="countdownNum" style="color:var(--teal);">${diffParts(now, end)}</p>`;
  }
  if (status === "expired") {
    return `<p class="countdown-label">Status</p><p class="countdown" style="color:var(--danger); font-size:16px;">Sudah kadaluwarsa</p>`;
  }
  return "";
}

/* expose to inline handlers */
window.state = state;
window.setState = setState;
window.onFilePicked = onFilePicked;
window.submitPhoto = submitPhoto;
window.resetMemberForm = resetMemberForm;
window.doAdminLogin = doAdminLogin;
window.adminLogout = adminLogout;
window.saveSession = saveSession;
window.deletePhoto = deletePhoto;
window.copyBroadcastText = copyBroadcastText;
window.copyShareLink = copyShareLink;

render();
</script>
</body>
</html>
