<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Form Intro — RAPI TEAM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<style>
  :root{
    --bg:#0F1B22; --surface:#16272F; --surface2:#1D323B; --line:#2A3E46;
    --amber:#E8A33D; --teal:#4FB0A5; --text:#EDE7DA; --muted:#8FA3AB; --danger:#D9705C;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--bg); font-family:'Inter',sans-serif; color:var(--text); min-height:100vh;}
  .display{font-family:'Space Grotesk',sans-serif;}
  button{cursor:pointer; border:none; font-family:inherit;}
  input, select{font-family:inherit;}
  ::selection{background:rgba(232,163,61,0.35);}

  .page-glow{position:fixed; inset:0; overflow:hidden; pointer-events:none; z-index:0;}
  .glow{position:absolute; border-radius:999px; filter:blur(80px); opacity:0.3;}
  .glow-amber{width:300px; height:300px; background:var(--amber); top:-70px; left:-70px; animation:driftA 10s ease-in-out infinite;}
  .glow-teal{width:340px; height:340px; background:var(--teal); bottom:-90px; right:-80px; animation:driftB 12s ease-in-out infinite;}
  @keyframes driftA{0%,100%{transform:translate(0,0);} 50%{transform:translate(30px,24px);}}
  @keyframes driftB{0%,100%{transform:translate(0,0);} 50%{transform:translate(-26px,-18px);}}
  #app{position:relative; z-index:1; max-width:520px; margin:0 auto;}

  .header{padding:32px 20px 8px; text-align:center;}
  .hero-icon{width:52px;height:52px;border-radius:14px;background:rgba(232,163,61,0.16); display:flex; align-items:center; justify-content:center; margin:0 auto 14px;}
  .hero-title{font-size:clamp(20px,5.6vw,26px); font-weight:700; letter-spacing:-0.02em; margin:0 0 8px;}
  .hero-sub{color:var(--muted); font-size:13px; max-width:400px; margin:0 auto; line-height:1.6;}

  .section{padding:24px 20px 40px;}
  .card{border-radius:16px; padding:20px; background:var(--surface); border:1px solid var(--line);}
  .field-label{color:var(--muted); font-size:12px; display:block; margin-bottom:6px;}
  .field{margin-bottom:14px;}
  .input, select.input{width:100%; background:var(--surface2); border:1px solid var(--line); color:var(--text); padding:10px 12px; border-radius:8px; font-size:14px; outline:none; transition:border-color .15s;}
  .input:focus{border-color:var(--amber);}
  .btn-amber{display:inline-flex; align-items:center; justify-content:center; gap:6px; padding:12px 18px; border-radius:8px; font-size:14px; font-weight:600; background:var(--amber); color:var(--bg); font-family:'Space Grotesk',sans-serif; transition:transform .12s, filter .12s; width:100%; margin-top:6px;}
  .btn-amber:hover{filter:brightness(1.08);} .btn-amber:active{transform:scale(0.98);}
  .btn-amber:disabled{opacity:0.6; cursor:not-allowed;}

  .msg{font-size:13px; margin-top:10px; padding:10px 12px; border-radius:8px; line-height:1.5;}
  .msg-ok{background:rgba(79,176,165,0.14); color:var(--teal);}
  .msg-err{background:rgba(217,112,92,0.14); color:var(--danger);}

  .success-box{text-align:center; padding:20px 0;}
  .success-icon{width:56px;height:56px;border-radius:999px;background:rgba(79,176,165,0.16); display:flex; align-items:center; justify-content:center; margin:0 auto 16px;}

  @keyframes fadeUp{ from{opacity:0; transform:translateY(12px);} to{opacity:1; transform:translateY(0);} }
  .card{animation:fadeUp .4s ease both;}
</style>
</head>
<body>

<div class="page-glow"><div class="glow glow-amber"></div><div class="glow glow-teal"></div></div>

<div id="app">
  <div class="header">
    <div class="hero-icon"><i data-lucide="hand-heart" size="24" color="#E8A33D"></i></div>
    <h1 class="display hero-title">Yuk Kenalan Dulu!</h1>
    <p class="hero-sub">Isi form Intro ini biar Admin & anggota lain kenal kamu. Selesai isi, kamu resmi jadi bagian dari Rapi Team.</p>
  </div>

  <div class="section">
    <div class="card" id="formCard">
      <div class="field">
        <label class="field-label">Nomor WhatsApp kamu</label>
        <input class="input" id="f_wa" type="tel" placeholder="08xxxxxxxxxx" />
      </div>
      <div class="field">
        <label class="field-label">Nama Lengkap</label>
        <input class="input" id="f_nama" type="text" placeholder="Nama kamu" />
      </div>
      <div class="field">
        <label class="field-label">Umur</label>
        <input class="input" id="f_umur" type="number" placeholder="Contoh: 17" />
      </div>
      <div class="field">
        <label class="field-label">Gender</label>
        <select class="input" id="f_gender">
          <option value="">Pilih salah satu</option>
          <option value="Laki-laki">Laki-laki</option>
          <option value="Perempuan">Perempuan</option>
        </select>
      </div>
      <div class="field">
        <label class="field-label">Kelas</label>
        <input class="input" id="f_kelas" type="text" placeholder="Contoh: XI IPA 2" />
      </div>
      <div class="field">
        <label class="field-label">Tujuan Join</label>
        <input class="input" id="f_tujuan" type="text" placeholder="Contoh: cari teman & info bermanfaat" />
      </div>

      <button class="btn-amber" id="btnSubmit" onclick="submitIntro()"><i data-lucide="send" size="15"></i> Kirim Intro</button>
      <div id="formMsg"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB674t6fiJ8HT9ENfeS3Vzv-BSGQTQ-3BI",
  authDomain: "rapi-dev-43ddf.firebaseapp.com",
  projectId: "rapi-dev-43ddf",
  storageBucket: "rapi-dev-43ddf.firebasestorage.app",
  messagingSenderId: "392684134756",
  appId: "1:392684134756:web:6ef9ed85f4fb29db29da71"
};
const fbApp = initializeApp(firebaseConfig);
const db = getFirestore(fbApp);

function normalizeWa(raw) {
  let n = raw.replace(/[^0-9]/g, "");
  if (n.startsWith("0")) n = "62" + n.slice(1);
  if (n.startsWith("8")) n = "62" + n;
  return n;
}
function esc(str) {
  return String(str ?? "").replace(/[&<>"']/g, m => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[m]));
}
function showMsg(text, ok) {
  document.getElementById("formMsg").innerHTML = `<div class="msg ${ok ? 'msg-ok' : 'msg-err'}">${esc(text)}</div>`;
}

window.submitIntro = async function () {
  const waRaw = document.getElementById("f_wa").value.trim();
  const nama = document.getElementById("f_nama").value.trim();
  const umur = document.getElementById("f_umur").value.trim();
  const gender = document.getElementById("f_gender").value;
  const kelas = document.getElementById("f_kelas").value.trim();
  const asal = document.getElementById("f_asal").value.trim();
  const tujuan = document.getElementById("f_tujuan").value.trim();
  const btn = document.getElementById("btnSubmit");

  if (!waRaw || waRaw.replace(/[^0-9]/g, "").length < 9) { showMsg("Nomor WA belum valid.", false); return; }
  if (!nama) { showMsg("Nama wajib diisi.", false); return; }
  if (!umur) { showMsg("Umur wajib diisi.", false); return; }
  if (!gender) { showMsg("Pilih gender dulu.", false); return; }

  const waId = normalizeWa(waRaw);
  btn.disabled = true;
  btn.innerHTML = `<i data-lucide="loader-2" size="15"></i> Mengirim...`;
  if (window.lucide) lucide.createIcons();

  try {
    const ref = doc(db, "rapiTeamMembers", waId);
    const snap = await getDoc(ref);

    if (!snap.exists()) {
      showMsg("Nomor WA kamu belum terdaftar. Minta Admin daftarkan dulu ya, baru isi form ini.", false);
      btn.disabled = false;
      btn.innerHTML = `<i data-lucide="send" size="15"></i> Kirim Intro`;
      if (window.lucide) lucide.createIcons();
      return;
    }

    if (snap.data().status_intro === "sudah") {
      renderSuccess("Kamu sudah pernah mengisi Intro sebelumnya. Terima kasih! 🎉");
      return;
    }

    await updateDoc(ref, {
      nama, umur, gender, kelas, asal, tujuan,
      status_intro: "sudah"
    });

    renderSuccess(`Intro kamu berhasil terkirim, ${esc(nama)}! Selamat datang di Rapi Team 🎉`);
  } catch (e) {
    showMsg("Gagal mengirim: " + e.message, false);
    btn.disabled = false;
    btn.innerHTML = `<i data-lucide="send" size="15"></i> Kirim Intro`;
    if (window.lucide) lucide.createIcons();
  }
};

function renderSuccess(message) {
  document.getElementById("formCard").innerHTML = `
    <div class="success-box">
      <div class="success-icon"><i data-lucide="check-circle-2" size="28" color="#4FB0A5"></i></div>
      <p class="display" style="font-size:16px; font-weight:600; margin:0 0 8px;">Berhasil!</p>
      <p style="color:var(--muted); font-size:13.5px; margin:0;">${message}</p>
    </div>`;
  if (window.lucide) lucide.createIcons();
}

if (window.lucide) lucide.createIcons();
</script>
</body>
</html>
